<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ELITE OS">
  <meta name="theme-color" content="#00D4FF">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="apple-touch-startup-image" href="icons/icon-512.png">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-touch-fullscreen" content="yes"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#07101E"/>
  <title>ELITE TRAINING</title>
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230a0a0a'/><text y='.9em' font-size='90'>💪</text></svg>"/>
  <!-- Firebase SDKs -->
  <style>
    /* System fonts - works 100% offline, no network requests */
    .bebas-font { font-family: 'Impact', 'Arial Narrow', 'Arial Black', sans-serif; letter-spacing: 2px; }
  </style>
  <style>
    /* DYSLEXIA MODE — uses Verdana, proven most readable for dyslexia, no external fonts needed */
    body.dyslexia-mode,
    body.dyslexia-mode p,
    body.dyslexia-mode div,
    body.dyslexia-mode span,
    body.dyslexia-mode input,
    body.dyslexia-mode textarea {
      font-family: Verdana, Geneva, sans-serif !important;
      letter-spacing: 0.06em !important;
      word-spacing: 0.15em !important;
      line-height: 2 !important;
    }
    body.dyslexia-mode .habit-label { font-size: 15px !important; }
    body.dyslexia-mode .ex-name { font-size: 15px !important; }
    body.dyslexia-mode .ex-note { font-size: 13px !important; }
    body.dyslexia-mode .box-txt { font-size: 13px !important; }
    body.dyslexia-mode .habit-detail { font-size: 13px !important; }
  </style>
  <style>
    :root{
      --accent:#00ff88;
      --bg:#07101E;
      --bg2:#0C1828;
      --card:#101C2E;
      --card2:#172438;
      --border:#1C2D42;
      --border2:#243550;
      --cyan:#00D4FF;
      --green:#00FF88;
      --orange:#FF8C00;
      --red:#FF2D55;
      --text:#E8F4FF;
      --text2:#7AA8CC;
      --text3:#3A5878;
      --nav-h:64px;
      --sat:env(safe-area-inset-top,0px);
      --sab:env(safe-area-inset-bottom,0px);
      --sal:env(safe-area-inset-left,0px);
      --sar:env(safe-area-inset-right,0px);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html{height:100%;background:var(--bg);}
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 20% 15%,rgba(0,90,180,0.2) 0%,transparent 55%),radial-gradient(ellipse at 80% 75%,rgba(0,60,130,0.15) 0%,transparent 50%),radial-gradient(ellipse at 10% 85%,rgba(50,0,120,0.1) 0%,transparent 45%),var(--bg);}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue','Segoe UI',sans-serif;min-height:100%;min-height:-webkit-fill-available;overscroll-behavior:none;-webkit-overflow-scrolling:touch;}
    .bebas{font-family:Impact,'Arial Narrow','Arial Black',sans-serif;}
    #app{max-width:480px;margin:0 auto;min-height:100vh;min-height:-webkit-fill-available;position:relative;z-index:1;padding-bottom:calc(var(--nav-h) + var(--sab) + 16px);}
    ::-webkit-scrollbar{width:2px;}
    ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

    /* HEADER */
    .header{padding:calc(16px + var(--sat)) 20px 14px;padding-top:max(52px, calc(16px + var(--sat)));border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:flex-start;}
    .h-eyebrow{font-size:9px;letter-spacing:4px;color:var(--text3);margin-bottom:2px;}
    .h-phase{font-size:30px;letter-spacing:2px;line-height:1;}
    .h-sub{font-size:12px;margin-top:2px;}
    .h-date{font-size:11px;color:var(--text3);margin-top:4px;}
    .prog-circle{width:52px;height:52px;border-radius:50%;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;flex-direction:column;flex-shrink:0;}
    .prog-num{font-size:17px;line-height:1;font-family:Impact,'Arial Narrow','Arial Black',sans-serif;}
    .prog-pct{font-size:8px;color:var(--text3);}

    /* MAIN TABS */
    .tabs{display:none;}
    .tabs::-webkit-scrollbar{display:none;}
    .tab-btn{flex-shrink:0;padding:11px 12px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);font-size:12px;letter-spacing:1.5px;cursor:pointer;font-family:Impact,'Arial Narrow','Arial Black',sans-serif;transition:all 0.2s;white-space:nowrap;}
    .tab-btn.active{border-bottom-color:var(--cyan);color:var(--cyan);}

    /* DAY SELECTOR TABS */
    .day-tabs{display:flex;padding:4px 16px 0;gap:6px;overflow-x:auto;}
    .day-tabs::-webkit-scrollbar{display:none;}
    .day-tab{flex-shrink:0;padding:8px 12px;border-radius:8px 8px 0 0;font-size:12px;letter-spacing:1px;cursor:pointer;font-family:Impact,'Arial Narrow','Arial Black',sans-serif;background:linear-gradient(180deg,rgba(12,26,45,0.9),rgba(8,18,32,0.95));color:var(--text3);border:1px solid var(--border2);border-bottom:none;transition:all 0.15s;white-space:nowrap;}
    .day-tab.active{color:#c8f3ff;border-color:var(--cyan);background:linear-gradient(180deg,rgba(0,160,255,0.35),rgba(10,28,50,0.95));box-shadow:0 0 12px rgba(0,212,255,0.3),inset 0 1px 0 rgba(180,235,255,0.35);}
    .day-tab.rest-day.active{color:#6699ff;border-color:#6699ff;}
    .day-tab.recovery-day.active{color:var(--orange);border-color:var(--orange);}
    .day-tab.hiit-day.active{color:#ff88aa;border-color:#ff88aa;}

    /* PHASE PILLS */
    .phase-row{padding:12px 20px 8px;display:flex;gap:8px;}
    .phase-btn{flex:1;padding:7px 4px;border-radius:6px;font-size:14px;letter-spacing:1px;cursor:pointer;font-family:Impact,'Arial Narrow','Arial Black',sans-serif;border:1px solid var(--border2);background:#141414;color:var(--text3);transition:all 0.2s;}
    .phase-btn.active{color:#000;}

    /* DAY CARD */
    .day-card{margin:0 20px 14px;background:var(--card);border-radius:0 10px 10px 10px;padding:14px 16px;border-left:3px solid var(--accent);}
    .day-name{font-size:24px;letter-spacing:1px;font-family:Impact,'Arial Narrow','Arial Black',sans-serif;}
    .day-tag{font-size:12px;color:#666;margin-top:2px;}

    /* INFO BOXES */
    .info-box{margin:0 20px 10px;border-radius:8px;padding:11px 14px;display:flex;align-items:center;gap:10px;}
    .info-box.warm{background:#0d1a12;border:1px solid #1a2e1f;}
    .info-box.cool{background:#110d1a;border:1px solid #1e1a2e;}
    .info-box.note{background:#1a1a0d;border:1px solid #2e2e1a;}
    .info-box.blue{background:#0d0f1a;border:1px solid #1a2030;}
    .box-icon{font-size:16px;flex-shrink:0;}
    .box-lbl{font-size:9px;color:var(--text3);letter-spacing:2px;}
    .box-txt{font-size:12px;margin-top:1px;}

    /* PROGRESS BAR */
    .prog-bar-wrap{padding:0 20px 14px;}
    .prog-bar-labels{display:flex;justify-content:space-between;margin-bottom:5px;font-size:10px;letter-spacing:2px;color:var(--text3);}
    .prog-bar-track{height:3px;background:var(--card2);border-radius:2px;}
    .prog-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s ease;}

    /* EXERCISE ITEMS */
    .ex-section{padding:0 20px;}
    .section-lbl{font-size:10px;letter-spacing:3px;color:var(--text3);margin-bottom:8px;}
    .section-lbl.pink{color:#ff88aa;}
    .section-lbl.yellow{color:#ffcc00;}
    .section-lbl.blue{color:#6699ff;}
    .ex-item{margin-bottom:8px;background:linear-gradient(180deg,rgba(18,38,62,0.95),rgba(10,22,38,0.95));border-radius:12px;border:1px solid #21466f;overflow:hidden;transition:border-color 0.15s;box-shadow:inset 0 1px 0 rgba(160,220,255,0.16);}
    .ex-item.done{border-color:rgba(0,255,136,0.3);background:rgba(0,20,10,0.5);}
    .ex-item.body-item.done{border-color:rgba(100,150,255,0.3);background:rgba(10,10,30,0.5);}
    .ex-top{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;}
    .ex-check{width:22px;height:22px;border-radius:5px;border:2px solid #333;background:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}
    .ex-check.checked{background:var(--green);border-color:var(--green);}
    .ex-check.checked::after{content:'✓';color:#000;font-size:12px;font-weight:bold;}
    .ex-check.blue-check{border-color:#2a2a44;}
    .ex-check.blue-check.checked{background:#6699ff;border-color:#6699ff;}
    .ex-check.yellow-check{border-color:#44440a;}
    .ex-check.yellow-check.checked{background:#ffcc00;border-color:#ffcc00;}
    .ex-info{flex:1;}
    .ex-name{font-size:14px;letter-spacing:0.3px;transition:all 0.15s;}
    .ex-item.done .ex-name{color:var(--text3);text-decoration:line-through;}
    .ex-note{font-size:11px;color:var(--text3);margin-top:2px;}
    .ex-reps-badge{font-size:12px;color:var(--accent);text-align:right;flex-shrink:0;white-space:nowrap;}
    .ex-reps-badge.blue{color:#6699ff;}
    .ex-reps-badge.yellow{color:#ffcc00;}

    /* WEIGHT INPUT */
    .ex-weight{padding:0 14px 12px;display:none;}
    .ex-weight.open{display:block;}
    .weight-row{display:flex;align-items:center;gap:10px;}
    .weight-lbl{font-size:10px;color:var(--text3);letter-spacing:2px;flex-shrink:0;}
    .weight-input{flex:1;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:6px;padding:7px 10px;color:#f0f0f0;font-size:14px;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;outline:none;}
    .weight-input:focus{border-color:var(--accent);}
    .weight-unit{font-size:12px;color:var(--text3);}
    .weight-note{font-size:10px;color:var(--text3);margin-top:5px;font-style:italic;}

    /* RECOVERY CHECKLIST ITEMS */
    .rec-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;margin:0 20px 8px;background:var(--card);border-radius:12px;border:1px solid var(--border2);cursor:pointer;transition:all 0.15s;}
    .rec-item.done{background:rgba(0,20,12,0.5);border-color:#1a3a1a;}
    .rec-item.blue-rec.done{background:#0d0f1a;border-color:#1a2030;}
    .rec-check{width:20px;height:20px;border-radius:4px;border:2px solid #333;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all 0.15s;}
    .rec-check.checked{background:var(--accent);border-color:var(--accent);}
    .rec-check.checked::after{content:'✓';color:#000;font-size:11px;font-weight:bold;}
    .rec-check.blue-rc.checked{background:#6699ff;border-color:#6699ff;}
    .rec-check.pink-rc.checked{background:#ff88aa;border-color:#ff88aa;}
    .rec-check.yellow-rc.checked{background:#ffcc00;border-color:#ffcc00;}
    .rec-text{font-size:13px;line-height:1.3;}
    .rec-item.done .rec-text{color:var(--text3);text-decoration:line-through;}
    .rec-detail{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.4;}

    /* SUPPS */
    .supp-item{display:flex;align-items:center;gap:12px;padding:13px 16px;margin:0 20px 8px;background:var(--card);border-radius:12px;border:1px solid var(--border2);cursor:pointer;transition:all 0.15s;}
    .supp-item.done{background:rgba(0,20,12,0.5);border-color:#1a3a1a;}
    .supp-check{width:22px;height:22px;border-radius:5px;border:2px solid #333;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}
    .supp-check.checked{background:var(--accent);border-color:var(--accent);}
    .supp-check.checked::after{content:'✓';color:#000;font-size:12px;font-weight:bold;}
    .supp-info{flex:1;}
    .supp-name{font-size:15px;font-family:Impact,'Arial Narrow','Arial Black',sans-serif;letter-spacing:0.5px;}
    .supp-item.done .supp-name{color:var(--text3);text-decoration:line-through;}
    .supp-detail{font-size:11px;color:var(--text3);margin-top:2px;}
    .supp-dose{font-size:10px;color:#000;padding:2px 8px;border-radius:20px;font-weight:600;white-space:nowrap;flex-shrink:0;}
    .sex-item{display:flex;align-items:center;gap:12px;padding:13px 16px;margin-bottom:8px;background:var(--card);border-radius:10px;border:1px solid #2a1a20;cursor:pointer;transition:all 0.15s;}
    .sex-item.done{background:#1a0d12;border-color:#3a1a22;}
    .sex-check{width:22px;height:22px;border-radius:5px;border:2px solid #3a1a2a;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}
    .sex-check.checked{background:#ff88aa;border-color:#ff88aa;}
    .sex-check.checked::after{content:'✓';color:#000;font-size:12px;font-weight:bold;}

    /* CALENDAR */
    .cal-wrap{padding:14px 20px;}
    .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .cal-month{font-size:22px;font-family:Impact,'Arial Narrow','Arial Black',sans-serif;letter-spacing:2px;}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
    .cal-dow{font-size:10px;color:var(--text3);text-align:center;padding:4px 0;letter-spacing:1px;}
    .cal-day{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;border:1px solid transparent;transition:all 0.15s;color:var(--text3);}
    .cal-day.empty{cursor:default;}
    .cal-day.today{border-color:var(--accent);color:#fff;}
    .cal-day.trained{background:var(--accent);color:#000;font-weight:600;}
    .cal-day.partial{background:#1a3a1a;color:var(--accent);}
    .cal-day.rest{background:#1a1a2e;color:#6699ff;}
    .cal-day.skipped{background:rgba(255,45,85,0.22);color:#ff8ea6;border-color:rgba(255,45,85,0.5);}
    .cal-day.manual{box-shadow:inset 0 0 0 1px rgba(255,255,255,0.18);}
    .nav-btn{background:none;border:1px solid #2a2a2a;border-radius:6px;color:var(--text2);padding:5px 12px;cursor:pointer;font-size:16px;}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
    .modal{background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;border-top:1px solid #222;}
    .modal-handle{width:36px;height:4px;background:#333;border-radius:2px;margin:0 auto 20px;}
    .modal-date{font-size:22px;font-family:Impact,'Arial Narrow','Arial Black',sans-serif;letter-spacing:2px;margin-bottom:16px;color:var(--accent);}
    .modal-section-lbl{font-size:10px;letter-spacing:3px;color:var(--text3);margin-bottom:8px;margin-top:16px;}
    .modal-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#0a0a0a;border-radius:6px;margin-bottom:4px;}
    .modal-close{width:100%;padding:14px;background:var(--card2);border:none;border-radius:10px;color:var(--text2);font-size:14px;cursor:pointer;margin-top:12px;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;}

    /* HABITS */
    .habit-item{display:flex;align-items:center;gap:14px;padding:13px 16px;margin:0 20px 8px;background:var(--card);border-radius:12px;border:1px solid var(--border2);cursor:pointer;transition:all 0.15s;}
    .habit-item.done{background:rgba(0,20,12,0.5);border-color:#1a3a1a;}
    .habit-check{width:22px;height:22px;border-radius:5px;border:2px solid #333;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}
    .habit-check.checked{background:var(--accent);border-color:var(--accent);}
    .habit-check.checked::after{content:'✓';color:#000;font-size:12px;font-weight:bold;}
    /* NEW GROUPED HABITS */
    .hgroup{margin:0 16px 10px;border-radius:14px;overflow:hidden;border:1px solid var(--border2);}
    .hgroup-header{display:flex;align-items:center;gap:12px;padding:14px 16px;background:#151515;cursor:pointer;user-select:none;-webkit-user-select:none;}
    .hgroup-icon{font-size:22px;flex-shrink:0;}
    .hgroup-label{font-size:16px;font-family:Impact,'Arial Narrow',sans-serif;letter-spacing:2px;flex:1;}
    .hgroup-count{font-size:13px;font-family:Impact,sans-serif;padding:3px 10px;border-radius:20px;background:#222;flex-shrink:0;}
    .hgroup-arrow{font-size:12px;color:var(--text3);flex-shrink:0;transition:transform 0.2s;}
    .hgroup-arrow.open{transform:rotate(90deg);}
    .hgroup-body{background:#0f0f0f;}
    .hnew-item{padding:14px 16px;border-bottom:1px solid #1a1a1a;cursor:pointer;user-select:none;-webkit-user-select:none;transition:background 0.15s;position:relative;overflow:hidden;}
    .hnew-item:last-child{border-bottom:none;}
    .hnew-item.done{background:#080f08;}
    .hnew-item.flash{animation:habitFlash 0.4s ease-out;}
    @keyframes habitFlash{0%{background:#00ff8844;}50%{background:#00ff8822;}100%{background:transparent;}}
    .hnew-item.done.flash{animation:habitFlashDone 0.4s ease-out;}
    @keyframes habitFlashDone{0%{background:#00ff8866;}100%{background:#080f08;}}
    .hnew-top{display:flex;align-items:center;gap:12px;}
    .hnew-check{width:26px;height:26px;border-radius:7px;border:2px solid #333;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;font-size:14px;font-weight:bold;}
    .hnew-check.checked{background:var(--accent);border-color:var(--accent);color:#000;}
    .hnew-icon{font-size:22px;flex-shrink:0;}
    .hnew-label{font-size:15px;line-height:1.4;flex:1;}
    .habit-label{font-size:15px;line-height:1.4;}
    .hnew-item.done .hnew-label{color:var(--text3);text-decoration:line-through;}
    .hnew-expand{font-size:10px;color:var(--text3);flex-shrink:0;transition:transform 0.2s;padding:4px;}
    .hnew-expand.open{transform:rotate(180deg);}
    .hnew-detail{padding:0 16px 14px 60px;display:none;}
    .hnew-detail.open{display:block;}
    .habit-detail{font-size:12px;color:#666;line-height:1.9;margin-bottom:8px;}
    .habit-today-tip{font-size:12px;padding:8px 12px;border-radius:8px;line-height:1.8;margin-top:4px;}
    .nut-card{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;margin:0 20px 8px;background:var(--card);border-radius:8px;border:1px solid var(--border);}
    .vyv-box{margin:16px 20px 0;padding:16px;background:#0d1219;border-radius:10px;border:1px solid #1a2030;}
    .timeline-wrap{position:relative;padding:14px 20px 14px 40px;}
    .timeline-line{position:absolute;left:26px;top:20px;bottom:20px;width:2px;background:linear-gradient(to bottom,#00ff88,#ff6b35,#ff0055);border-radius:1px;}
    .tl-item{position:relative;margin-bottom:20px;}
    .tl-dot{position:absolute;left:-21px;top:5px;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg);}
    .tl-week{font-size:14px;font-family:Impact,'Arial Narrow','Arial Black',sans-serif;letter-spacing:1px;}
    .tl-text{font-size:12px;color:#777;margin-top:3px;line-height:1.5;}
    .warn-box{margin:8px 20px 32px;padding:14px;background:#1a0d0d;border-radius:10px;border:1px solid #2e1a1a;}

    .content-area{padding-bottom:calc(48px + var(--sab));}
    .divider{height:1px;background:var(--card2);margin:16px 20px;}
    .saved-badge{position:fixed;bottom:calc(20px + var(--sab));left:50%;transform:translateX(-50%);background:var(--accent);color:#000;font-size:12px;font-family:Impact,'Arial Narrow','Arial Black',sans-serif;letter-spacing:2px;padding:8px 20px;border-radius:20px;z-index:50;opacity:0;transition:opacity 0.3s;pointer-events:none;}
    .saved-badge.show{opacity:1;}
  
    /* ── STRETCH TIMERS ── */
    .stretch-timers{margin:10px 20px 0;background:#0d0a1a;border:1px solid #2a1a4a;border-radius:10px;overflow:hidden;}
    .stretch-timers-hdr{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a1228;}
    .stretch-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #1a1228;}
    .stretch-row:last-child{border-bottom:none;}

async function loadDB(){
  // Always load localStorage as immediate fallback
  try { DB = JSON.parse(localStorage.getItem('eliteV4')||'{}'); } catch(e){ DB={}; }
  if(!DOC_REF){
    DB_LOADED = true;
    if(typeof DB.powerSaveMode === 'undefined') DB.powerSaveMode = true;
    if(DB.activeDay) UI.activeDay = DB.activeDay;
    if(DB.lastEquip) UI.activeEquip = DB.lastEquip;
    if(DB.dyslexiaMode) document.body.classList.add('dyslexia-mode');
    applyPowerModeClass();
    render();
    return;
  }
  try {
    const snap = await DOC_REF.get();
    if(snap.exists){
      DB = snap.data();
      // Sync to localStorage as offline backup
      localStorage.setItem('eliteV4', JSON.stringify(DB));
    } else {
      // First time — push localStorage data up to Firestore if any
      if(Object.keys(DB).length > 0){
        await DOC_REF.set(DB);
      }
    }
  } catch(e){
    console.warn('Firebase offline, using localStorage:', e.message);
  }
  DB_LOADED = true;
  if(typeof DB.powerSaveMode === 'undefined') DB.powerSaveMode = true;
  // Sync UI state from DB
  if(DB.activeDay) UI.activeDay = DB.activeDay;
  if(DB.lastEquip) UI.activeEquip = DB.lastEquip;
  if(DB.dyslexiaMode) document.body.classList.add('dyslexia-mode');
  applyPowerModeClass();
  render();
}

// Debounced save — batches rapid changes into one write
let _saveTimer = null;
function saveDB(){
  // Always save to localStorage immediately
  try { localStorage.setItem('eliteV4', JSON.stringify(DB)); } catch(e){}
  showSaved();
  if(!DOC_REF)return;
  // Debounce Firestore writes to max 1 per 2 seconds
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async ()=>{
    try {
      await DOC_REF.set(DB);
    } catch(e){
      console.warn('Firebase save failed, data safe in localStorage:', e.message);
    }
  }, 2000);
}

  const b=document.getElementById('savedBadge');
  if(!b)return;
  b.classList.add('show');

}

function todayStr(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function dateLabel(s){
  if(!s || typeof s !== 'string' || !s.includes('-'))return'';
  const[y,m,d]=s.split('-');
  const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthIdx=parseInt(m,10)-1;
  const dayNum=parseInt(d,10);
  if(Number.isNaN(monthIdx) || monthIdx<0 || monthIdx>11 || Number.isNaN(dayNum)) return s;
  return`${M[monthIdx]} ${dayNum}, ${y}`;
}
function getDowStr(dateStr){
  if(!dateStr || typeof dateStr !== 'string' || !dateStr.includes('-')) return 'MON';
  const[y,m,d]=dateStr.split('-');
  const dt=new Date(parseInt(y,10),parseInt(m,10)-1,parseInt(d,10));
  if(Number.isNaN(dt.getTime())) return 'MON';
  const day=dt.getDay();
  return ALL_DAYS[day===0?6:day-1];
}
function todayDow(){
  const dow=new Date().getDay(); // 0=sun
  // map to MON=0...SUN=6
  return ALL_DAYS[dow===0?6:dow-1];
}

function getDD(date){
  if(!DB.days)DB.days={};
  if(!DB.days[date])DB.days[date]={ex:{},w:{},bf:{},rec:{},supp:{},sex:{},habits:{},bp:{},sleep:{},urges:[],hygiene:{},minox:{}};
  return DB.days[date];
}
function setAccent(c){document.documentElement.style.setProperty('--accent',c);}
function getDayType(d){return({'MON':'PULL','TUE':'PUSH','WED':'LEGS','THU':'ARMS+CORE','FRI':'OPTIONAL','SAT':'FIGHT DAY','SUN':'REST'})[d]||'TRAIN';}

  function countCompletedExercisesAnyEquip(dd, dayIdx){
  if(!dd || !dd.ex) return 0;
  var total=0;
  EQUIP_KEYS.forEach(function(ek){
    var prefix=ek+'-'+dayIdx+'-';
    Object.keys(dd.ex).forEach(function(k){
      if(dd.ex[k] && k.indexOf(prefix)===0) total++;
    });
  });
  return total;
}
function getDayExerciseTarget(dayIdx){
  var maxLen=0;
  EQUIP_KEYS.forEach(function(ek){
    var exs=FIGHTERS[ek]&&FIGHTERS[ek].days[dayIdx]?FIGHTERS[ek].days[dayIdx].exercises:[];
    if(exs.length>maxLen) maxLen=exs.length;
  });
  return maxLen;
}

// DAILY WIN SCORE
// ═══════════════════════════════════════════════════════════
function computeDailyWinScore(date, dd) {
  const ad = getDowStr(date);
  const dayIdx = ['MON','TUE','WED','THU','FRI'].indexOf(ad);
  let score = 0, total = 0;

  // WORKOUT (30 pts)
  if (ad !== 'SUN') {
    total += 30;
    if (ad === 'SAT') {
      const done = SATURDAY_PLAN.filter((_,i) => dd.rec && dd.rec['sat-'+i]).length;
      score += Math.round(done / SATURDAY_PLAN.length * 30);
    } else if (dayIdx >= 0) {
      const target = getDayExerciseTarget(dayIdx);
      if (target > 0) {
        const exDone = countCompletedExercisesAnyEquip(dd, dayIdx);
        score += Math.round(Math.min(1, exDone / target) * 30);
      }
    }
  }

  // SUPPLEMENTS (20 pts)
  total += 20;
  const suppTotal = SUPPLEMENTS.length;
  const suppDone = SUPPLEMENTS.filter((_, i) => dd.supp && dd.supp[i]).length;
  score += Math.round((suppDone / suppTotal) * 20);

  // HABITS (20 pts)
  total += 20;
  const allHabitIds = HABIT_GROUPS.flatMap(g => g.habits.map(h => h.id));
  const habitsDone = allHabitIds.filter(id => dd.habits && dd.habits[id]).length;
  score += Math.round((habitsDone / allHabitIds.length) * 20);

  // WATER + PROTEIN + SLEEP (15 pts, 5 each)
  total += 15;
  if (dd.habits && dd.habits[3]) score += 5; // water
  if (dd.habits && dd.habits[4]) score += 5; // protein
  if (dd.habits && dd.habits[5]) score += 5; // sleep

  // CLEAN DAY / RECOVERY (15 pts)
  total += 15;
  const sexDone = SEX_CHECKLIST.filter((_, i) => isSexChecklistDone(dd, i)).length
  score += Math.round((sexDone / SEX_CHECKLIST.length) * 15);
  
  const pct = Math.round((score / total) * 100);
  return Math.min(100, pct);
}

function getScoreColor(pct) {
  if (pct >= 85) return '#00ff88';
  if (pct >= 60) return '#ff6b35';
  return '#ff0055';
}

function isSexChecklistDone(dd, idx) {
  if (!dd || !dd.sex) return false;
  return !!(dd.sex[idx] || dd.sex['sex-' + idx]);
}
  
function getScoreLabel(pct) {
  if (pct >= 90) return 'ELITE';
  if (pct >= 75) return 'STRONG';
  if (pct >= 50) return 'AVERAGE';
  if (pct >= 25) return 'WEAK';
  return 'ZERO';
}

              const numParts=isSuperset?ex.n.replace(/\s*\(superset.*?\)/i,'').split(' + ').length:1;
              const summaries=[];
              for(let pi=0;pi<numParts;pi++){
                const psets=[];
                for(let s=0;s<ex.s;s++){
                  const sw=getDD(today).w[baseKey+'-p'+pi+'-s'+s];
                  if(sw) psets.push('S'+(s+1)+':'+sw+'lb');
                }
                if(psets.length) summaries.push(psets.join(' · '));
              }
              note.innerHTML=summaries.length?summaries.join(' | '):ex.s+' sets · tap to log weights';
              note.style.color=summaries.length?'var(--accent)':'#555';
            }
          }
        }
      });
      inp.addEventListener('focus',()=>setTimeout(()=>inp.scrollIntoView({behavior:'smooth',block:'center'}),300));
    });
  }
}

function renderCalendar(){
  const today=todayStr();
  const year=UI.calYear,month=UI.calMonth;
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const daysInMonth=new Date(year,month+1,0).getDate();
  const firstDay=new Date(year,month,1).getDay();
  const days=[];
  for(let i=0;i<firstDay;i++)days.push(null);
  for(let i=1;i<=daysInMonth;i++)days.push(i);
  if(data.cal&&data.cal.manualStatus) return data.cal.manualStatus;
  function getStatus(d){
    if(!d)return'';
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const data=DB.days&&DB.days[ds];
    if(!data)return'';
    
    const exDone=Object.values(data.ex||{}).filter(Boolean).length;
    const recDone=Object.values(data.rec||{}).filter(Boolean).length;
    const suppDone=Object.values(data.supp||{}).filter(Boolean).length;
    const dow=new Date(parseInt(year),parseInt(month),parseInt(d)).getDay();
    if(dow===0)return recDone>=3?'rest':'';
    if(exDone>=3||suppDone>=5)return'trained';
    if(exDone>0||recDone>0)return'partial';
    return'';
  }

  let streak=0;
  const chk=new Date();
  while(streak<365){
    const ds=`${chk.getFullYear()}-${String(chk.getMonth()+1).padStart(2,'0')}-${String(chk.getDate()).padStart(2,'0')}`;
    const data=DB.days&&DB.days[ds];
    const active=data&&(Object.values(data.ex||{}).filter(Boolean).length>0||Object.values(data.rec||{}).filter(Boolean).length>0);
    if(active){streak++;chk.setDate(chk.getDate()-1);}else break;
  }
  const trainedDays=Object.entries(DB.days||{}).filter(([,v])=>Object.values(v.ex||{}).filter(Boolean).length>0||Object.values(v.rec||{}).filter(Boolean).length>0).length;

  const cells=days.map(d=>{
    if(!d)return`<div class="cal-day empty"></div>`;
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=ds===today;
    const st=getStatus(d);
    const data=DB.days&&DB.days[ds];
    const manual=data&&data.cal&&data.cal.manualStatus;
    const cls=['cal-day',isToday?'today':'',st,manual?'manual':''].filter(Boolean).join(' ');
    return`<div class="${cls}" onclick="cycleCalendarStatus('${ds}')">${d}</div>`;
  }).join('');

  return`
    <div class="cal-wrap">
      <div style="display:flex;gap:12px;margin-bottom:16px">
        <div style="flex:1;background:var(--card);border-radius:10px;padding:12px;border:1px solid var(--border);text-align:center">
          <div style="font-size:28px;font-family:Impact,'Arial Narrow','Arial Black',sans-serif;color:var(--accent)">${streak}</div>
          <div style="font-size:10px;color:var(--text3);letter-spacing:2px">DAY STREAK</div>
        </div>
        <div style="flex:1;background:var(--card);border-radius:10px;padding:12px;border:1px solid var(--border);text-align:center">
          <div style="font-size:28px;font-family:Impact,'Arial Narrow','Arial Black',sans-serif;color:#ff6b35">${trainedDays}</div>
          <div style="font-size:10px;color:var(--text3);letter-spacing:2px">ACTIVE DAYS</div>
        </div>
      </div>
      <div style="margin-bottom:10px;font-size:10px;color:var(--text3);letter-spacing:1px">Tap day to cycle: Auto → Green done → Red skipped</div>
      <div class="cal-nav">
        <button class="nav-btn" onclick="calPrev()">‹</button>
        <div class="cal-month">${monthNames[month]} ${year}</div>
        <button class="nav-btn" onclick="calNext()">›</button>
      </div>
      <div class="cal-grid">
        ${['S','M','T','W','T','F','S'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}
        ${cells}
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;padding:12px;background:var(--card);border-radius:8px;border:1px solid #1a1a1a">
        <div style="display:flex;align-items:center;gap:6px"><div style="width:12px;height:12px;border-radius:3px;background:var(--accent)"></div><span style="font-size:11px;color:#666">Trained</span></div>
        <div style="display:flex;align-items:center;gap:6px"><div style="width:12px;height:12px;border-radius:3px;background:#1a3a1a"></div><span style="font-size:11px;color:#666">Partial</span></div>
        <div style="display:flex;align-items:center;gap:6px"><div style="width:12px;height:12px;border-radius:3px;background:#1a1a2e"></div><span style="font-size:11px;color:#666">Recovery</span></div>
        <div style="display:flex;align-items:center;gap:6px"><div style="width:12px;height:12px;border-radius:3px;border:1px solid var(--accent)"></div><span style="font-size:11px;color:#666">Today</span></div>
      </div>
      <div style="margin-top:10px;font-size:11px;color:var(--text3);text-align:center;letter-spacing:1px">TAP ANY DAY TO SEE YOUR LOG</div>
    </div>`;
}

function renderModal(dateStr){
  const data=DB.days&&DB.days[dateStr];
  let sections='';
  if(data){
    const exE=Object.entries(data.ex||{}).filter(([,v])=>v);
    if(exE.length){
      sections+=`<div class="modal-section-lbl">EXERCISES</div>${exE.map(([key])=>{
        const[p,d,i]=key.split('-').map(Number);
        // Try all equipment setups to find the exercise name
        const equipKeys2=['gym','bowflex','bands','bodyweight'];
        let ex=null;
        for(var ek2=0;ek2<equipKeys2.length;ek2++){
          const candidate=(FIGHTERS[equipKeys2[ek2]] && FIGHTERS[equipKeys2[ek2]].days[d] && FIGHTERS[equipKeys2[ek2]].days[d].exercises[i]);
          if(candidate){ex=candidate;break;}
        }
        if(!ex) return '';
        // Build per-set weight display
        const setRows=[];
        for(let s=0;s<ex.s;s++){
          const sw=(data.w && data.w[key+'-s'+s]);
          if(sw) setRows.push('<span style="font-size:11px;color:var(--text3);margin-right:8px">S'+(s+1)+'</span><span style="font-size:12px;color:var(--accent)">'+sw+'lbs</span>');
        }
        const weightDisplay=setRows.length
          ? `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">${setRows.map(r=>'<span style="background:rgba(0,20,12,0.5);padding:3px 8px;border-radius:4px;display:inline-flex;align-items:center;gap:4px">'+r+'</span>').join('')}</div>`
          : `<span style="font-size:12px;color:#555">${ex.s}×${ex.r}</span>`;
        return `<div class="modal-row" style="flex-direction:column;align-items:flex-start;gap:4px">
          <span style="font-size:13px;color:#ccc">${ex.n}</span>
          ${weightDisplay}
        </div>`;
      }).join('')}`;
    }
    const bfE=Object.entries(data.bf||{}).filter(([,v])=>v);
    if(bfE.length){
      sections+=`<div class="modal-section-lbl" style="color:#6699ff">BODY FIX DONE</div>${bfE.map(([key])=>{
        const i=parseInt(key.split('-')[2]);
        const bf=BODY_FIX[i];
        return bf?`<div class="modal-row"><span style="font-size:12px;color:#6699ff">${bf.n}</span><span style="color:#6699ff">✓</span></div>`:'';
      }).join('')}`;
    }
    const recE=Object.entries(data.rec||{}).filter(([,v])=>v);
    if(recE.length){
      sections+=`<div class="modal-section-lbl">RECOVERY / ACTIVITIES</div>${recE.map(([key])=>{
        let label='';
        if(key.startsWith('fri-'))label=(FRIDAY_PLAN[parseInt(key.split('-')[1])] && FRIDAY_PLAN[parseInt(key.split('-')[1])].t);
        else if(key.startsWith('sat-'))label=(SATURDAY_PLAN[parseInt(key.split('-')[1])] && SATURDAY_PLAN[parseInt(key.split('-')[1])].t);
        else if(key.startsWith('sun-'))label=(SUNDAY_PLAN[parseInt(key.split('-')[1])] && SUNDAY_PLAN[parseInt(key.split('-')[1])].t);
        else if(key.startsWith('prep-'))label='📦 '+(PREP_CHECKLIST[parseInt(key.split('-')[1])] && PREP_CHECKLIST[parseInt(key.split('-')[1])].t);
        return label?`<div class="modal-row"><span style="font-size:12px;color:#ccc">${label}</span><span style="color:#00ff88">✓</span></div>`:'';
      }).join('')}`;
    }
    const suppE=Object.entries(data.supp||{}).filter(([,v])=>v);
    if(suppE.length){
      sections+=`<div class="modal-section-lbl">SUPPLEMENTS</div>${suppE.map(([idx])=>{
        const s=SUPPLEMENTS[parseInt(idx)];
        return s?`<div class="modal-row"><span style="font-size:12px;color:#ccc">${s.n}</span><span style="font-size:11px;color:#555">${s.dose}</span></div>`:'';
      }).join('')}`;
    }
    const sexE=Object.entries(data.sex||{}).filter(([,v])=>v);
    if(sexE.length){
      sections+=`<div class="modal-section-lbl" style="color:#ff88aa">SEX GOD HABITS</div>${sexE.map(([idx])=>{
        const s=SEX_CHECKLIST[parseInt(idx)];
        return s?`<div class="modal-row"><span style="font-size:12px;color:#ff88aa">${s.n}</span><span>✓</span></div>`:'';
      }).join('')}`;
    }
  }
  if(!sections)sections=`<div style="font-size:13px;color:var(--text3);text-align:center;padding:20px">No data recorded for this day.</div>`;
  return`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-handle"></div>
        <div class="modal-date">${dateLabel(dateStr)}</div>
        ${sections}
        <button class="modal-close" onclick="closeModal()">CLOSE</button>
      </div>
    </div>`;
}

function downloadPrayerDeclaration(){
  try{
    var txt=getPrayerDeclarationText();
    var blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    var d=new Date();
    a.href=url;
    a.download='prayer-declaration-'+d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+'.txt';
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(function(){URL.revokeObjectURL(url);},500);
  }catch(e){
    alert('Could not download file on this device.');
  }
}

function toggleHabitGroup(key){
  var body = document.getElementById('body-'+key);
  var arr = document.getElementById('arr-'+key);
  if(!body) return;
  var isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  if(arr){ arr.classList.toggle('open', !isOpen); }
  var dd = getDD(UI.activeDate);
  dd.habits[key+'_collapsed'] = !isOpen;
  saveDB();
}

function toggleHabitDetail(key){
  var det = document.getElementById('det-'+key);
  var exp = document.getElementById('exp-'+key);
  if(!det) return;
  var isOpen = det.classList.contains('open');
  det.classList.toggle('open', !isOpen);
  if(exp) exp.classList.toggle('open', !isOpen);
  var dd = getDD(UI.activeDate);
  dd.habits[key+'_open'] = !isOpen;
  saveDB();
}

function toggleHabitNew(e, date, idx){
  e.stopPropagation();
  var dd = getDD(date);
  dd.habits[idx] = !dd.habits[idx];
  saveDB();
  var item = document.getElementById('hi-'+idx);
  if(!item){ render(); return; }
  var check = item.querySelector('.hnew-check');
  var label = item.querySelector('.hnew-label');
  if(dd.habits[idx]){
    item.classList.add('done');
    if(check){ check.classList.add('checked'); check.innerHTML='&#10003;'; }
    if(label){ label.style.color='#444'; label.style.textDecoration='line-through'; }
  } else {
    item.classList.remove('done');
    if(check){ check.classList.remove('checked'); check.innerHTML=''; }
    if(label){ label.style.color=''; label.style.textDecoration=''; }
  }
  item.classList.add('flash');
  setTimeout(function(){ item.classList.remove('flash'); }, 500);
  var totalDone = HABITS.filter(function(_,i){ return !!getDD(date).habits[i]; }).length;
  var newPct = Math.round(totalDone/HABITS.length*100);
  var fills = document.querySelectorAll('.hab-prog-fill');
  fills.forEach(function(f){ f.style.width=newPct+'%'; });
  var cnts = document.querySelectorAll('.hab-total-count');
  cnts.forEach(function(c){ c.textContent=totalDone+'/'+HABITS.length; });
}

function renderWeeklySummary(today){

  const weekDays=[];
  for(let i=0;i<7;i++){
    const d=new Date(monday);
    d.setDate(d.getDate()+i);
    weekDays.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));
  }

  const weekLabel = 'Week of '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][monday.getMonth()]+' '+monday.getDate();

  // ── WORKOUT SCORE ──
  // Training days are Mon(0) Tue(1) Wed(2) Thu(3) — skip Fri Sat Sun for compound score
  let workoutScore=0, workoutDone=0, workoutTotal=4;
  // phase replaced by FIGHTERS equipment system
  [0,1,2,3].forEach((dayIdx,wi)=>{
    const ds=weekDays[wi];
    const dayData=DB.days&&DB.days[ds];
    if(!dayData) return;
    const status=dayData.rec&&dayData.rec['workout-status-'+dayIdx];
    if(status==='completed'||status==='completed-full-circuit'){ workoutDone++; return; }
    if(status==='completed-bare-minimum'){ workoutDone+=0.6; return; }
    if(status==='completed-emergency-3min'){ workoutDone+=0.35; return; }
    if(status==='sick'){ workoutDone+=0.5; return; } // sick day counts half
    const doneAny = countCompletedExercisesAnyEquip(dayData, dayIdx);
    const target = Math.min(getDayExerciseTarget(dayIdx), DB.minExercises||5);
    if(doneAny>=target) workoutDone++;
  });
  workoutScore=Math.round(workoutDone/workoutTotal*100);

  // ── SUPPLEMENT SCORE ──
  let suppTotal=0, suppDone=0;
  weekDays.forEach(ds=>{
    const dayData=DB.days&&DB.days[ds];
    const totalSupps=SUPPLEMENTS.length;
    suppTotal+=totalSupps;
    if(dayData&&dayData.supp) suppDone+=Object.values(dayData.supp).filter(Boolean).length;
  });
  const suppScore=suppTotal>0?Math.round(suppDone/suppTotal*100):0;

  // ── CLEAN STREAK (as of today) ──
  const streak=calcCleanStreak(today);
  // Days clean this week
  let cleanDays=0;
  weekDays.forEach(ds=>{
    const dayData=DB.days&&DB.days[ds];
    if(dayData&&dayData.sex&&dayData.sex['porn-status']==='clean') cleanDays++;
  });

  // ── SLEEP AVERAGE ──
  let sleepTotal=0, sleepCount=0;
  weekDays.forEach(ds=>{
    const dayData=DB.days&&DB.days[ds];
    if(dayData&&dayData.sleep&&dayData.sleep.hours){
      sleepTotal+=dayData.sleep.hours;
      sleepCount++;
    }
  });
  const sleepAvg=sleepCount>0?(sleepTotal/sleepCount).toFixed(1):null;

  // ── BP TREND ──
  // Get all BP readings this week, compare first vs last
  const bpReadings=[];
  weekDays.forEach(ds=>{
    const dayData=DB.days&&DB.days[ds];
    if(dayData&&dayData.bp){
      Object.entries(dayData.bp).forEach(([time,val])=>{
        const[sys]=val.split('/').map(Number);
        bpReadings.push({ds,time,sys,val});
      });
    }
  });
  let bpTrend=null, bpTrendColor='#888', bpTrendIcon='→';
  if(bpReadings.length>=2){
    const first=bpReadings[0].sys;
    const last=bpReadings[bpReadings.length-1].sys;
    const diff=last-first;
    if(diff<=-3){bpTrend='Down '+Math.abs(diff)+' pts';bpTrendColor='#00ff88';bpTrendIcon='↓';}
    else if(diff>=3){bpTrend='Up '+diff+' pts';bpTrendColor='#ff0055';bpTrendIcon='↑';}
    else{bpTrend='Stable';bpTrendColor='#ffcc00';bpTrendIcon='→';}
  }

  // ── HABITS SCORE ──
  let habitsTotal=0, habitsDone=0;
  weekDays.forEach(ds=>{
    const dayData=DB.days&&DB.days[ds];
    habitsTotal+=HABITS.length;
    if(dayData&&dayData.habits) habitsDone+=Object.values(dayData.habits).filter(Boolean).length;
  });
  const habitsScore=habitsTotal>0?Math.round(habitsDone/habitsTotal*100):0;

  // ── OVERALL WEEK SCORE ──
  // Weighted: workouts 35%, supplements 20%, clean days 25%, sleep 10%, habits 10%
  const cleanScore=Math.round(cleanDays/7*100);
  const sleepScore=sleepAvg?(sleepAvg>=7?100:sleepAvg>=6?70:40):50;
  const overallScore=Math.round(workoutScore*0.35+suppScore*0.20+cleanScore*0.25+sleepScore*0.10+habitsScore*0.10);
  const scoreColor=overallScore>=80?'#00ff88':overallScore>=60?'#ff6b35':'#ff0055';
  const scoreLabel=overallScore>=90?'ELITE':overallScore>=80?'STRONG':overallScore>=70?'SOLID':overallScore>=60?'BUILDING':'NEEDS WORK';

  // ── DAY-BY-DAY BREAKDOWN ──
  const dayNames=['MON','TUE','WED','THU','FRI','SAT','SUN'];
  const dayBreakdown=weekDays.map((ds,i)=>{
    const dayData=DB.days&&DB.days[ds];
    const isToday=ds===today;
    const isFuture=ds>today;
    const isTraining=i<4;
    let dots='';
    if(!isFuture){
      // Workout dot (training days only)
      if(isTraining){
        const exs=(FIGHTERS.gym&&FIGHTERS.gym.days[i]?FIGHTERS.gym.days[i].exercises:[]);
        const done=dayData?exs.filter((_,ei)=>dayData.ex&&dayData.ex[UI.activePhase+'-'+i+'-'+ei]).length:0;
        const pct=done/exs.length;
        dots+='<span style="font-size:8px;color:'+(pct>=0.7?'#00ff88':pct>0?'#ff6b35':'#333')+'">💪</span>';
      }
      // Clean dot

      dots+='<span style="font-size:8px;color:'+(pornStatus==='clean'?'#00ff88':pornStatus==='slipped'?'#ff0055':'#333')+'">🧠</span>';
      // Sleep dot
      const hrs=dayData&&dayData.sleep&&dayData.sleep.hours;
      dots+='<span style="font-size:8px;color:'+(hrs>=7?'#00ff88':hrs>=6?'#ff6b35':hrs?'#ff0055':'#333')+'">😴</span>';
    }
    return '<div style="text-align:center;flex:1">'
      +'<div style="font-size:9px;color:'+(isToday?'#ff6b35':'#444')+';margin-bottom:4px;font-family:Impact,sans-serif">'+dayNames[i]+'</div>'
      +'<div style="background:'+(isToday?'#1a0900':'#0d0d0d')+';border:1px solid '+(isToday?'#ff6b35':'#1e1e1e')+';border-radius:6px;padding:6px 2px;min-height:48px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px">'
      +(isFuture?'<span style="font-size:8px;color:#222">-</span>':dots)
      +'</div></div>';
  }).join('');

  // ── GRADE MESSAGE ──
  const gradeMessages={
    ELITE: 'LOCKED THE FUCK IN. This is what it looks like when you stop making excuses and actually commit. This is who you are when you are not being a lazy bitch. Keep it.',
    STRONG: 'Strong week. Good. But you still left points on the table and you know exactly where. Do not come back next week with the same gaps.',
    SOLID: 'Solid is a bitch word. Solid means you did enough to not feel guilty but not enough to actually change. Stop settling for solid.',
    BUILDING: 'Building is what you call it when you are too scared to fully commit. You skipped things, made excuses, and told yourself it is fine. It is not fine. Stop being a little bitch about hard days.',
    'NEEDS WORK': 'This score is embarrassing and you know it. You have the full program, the supplements, the system, God in your corner — and you still could not execute. Stop lying to yourself about wanting to change and actually change.',
  };

  return '<div style="padding:14px 0">'

    // ── WEEK SCORE HERO ──
    +'<div style="margin:0 16px 16px;padding:24px 20px;background:linear-gradient(135deg,#0a0a0a,#111);border:2px solid '+scoreColor+';border-radius:14px;text-align:center">'

    +'<div style="font-size:80px;font-family:Impact,sans-serif;color:'+scoreColor+';line-height:1">'+overallScore+'</div>'
    +'<div style="font-size:20px;font-family:Impact,sans-serif;letter-spacing:3px;color:'+scoreColor+';margin-bottom:10px">'+scoreLabel+'</div>'
    +'<div style="font-size:12px;color:#666;line-height:1.6;font-style:italic">'+gradeMessages[scoreLabel]+'</div>'
    +(overallScore<60?'<div style="font-size:11px;color:#ff0055;margin-top:10px;padding-top:10px;border-top:1px solid #1a0000;font-family:Impact,sans-serif;letter-spacing:1px">STOP BEING A BITCH. YOU ARE BETTER THAN THIS SCORE.</div>':'')
    +'</div>'

    // ── DAY BY DAY ──
    +'<div style="margin:0 16px 16px;padding:14px;background:var(--card);border:1px solid var(--border2);border-radius:12px">'
    +'<div style="font-size:10px;letter-spacing:2px;color:var(--text3);margin-bottom:10px;font-family:Impact,sans-serif">DAY BY DAY</div>'
    +'<div style="display:flex;gap:4px">'+dayBreakdown+'</div>'
    +'<div style="display:flex;gap:12px;margin-top:8px;font-size:10px;color:#555">'
    +'<span>💪 Workout</span><span>🧠 Clean</span><span>😴 Sleep 7h+</span>'
    +'</div></div>'

    // ── STAT CARDS ──
    +'<div style="margin:0 16px 16px;display:grid;grid-template-columns:1fr 1fr;gap:10px">'

    +'<div style="padding:14px;background:var(--card);border:1px solid var(--border2);border-radius:12px;text-align:center">'
    +'<div style="font-size:9px;letter-spacing:2px;color:var(--text3);margin-bottom:6px;font-family:Impact,sans-serif">WORKOUTS</div>'
    +'<div style="font-size:32px;font-family:Impact,sans-serif;color:'+(workoutScore>=75?'#00ff88':workoutScore>=50?'#ff6b35':'#ff0055')+'">'+workoutDone+'/'+workoutTotal+'</div>'
    +'<div style="font-size:10px;color:var(--text3);margin-top:2px">sessions completed</div>'
    +'</div>'

    +'<div style="padding:14px;background:var(--card);border:1px solid var(--border2);border-radius:12px;text-align:center">'
    +'<div style="font-size:9px;letter-spacing:2px;color:var(--text3);margin-bottom:6px;font-family:Impact,sans-serif">CLEAN DAYS</div>'
    +'<div style="font-size:32px;font-family:Impact,sans-serif;color:'+(cleanDays>=6?'#00ff88':cleanDays>=4?'#ff6b35':'#ff0055')+'">'+cleanDays+'/7</div>'
    +'<div style="font-size:10px;color:var(--text3);margin-top:2px">'+streak+' day total streak</div>'
    +'</div>'

    +'<div style="padding:14px;background:var(--card);border:1px solid var(--border2);border-radius:12px;text-align:center">'
    +'<div style="font-size:9px;letter-spacing:2px;color:var(--text3);margin-bottom:6px;font-family:Impact,sans-serif">SUPPLEMENTS</div>'
    +'<div style="font-size:32px;font-family:Impact,sans-serif;color:'+(suppScore>=80?'#00ff88':suppScore>=60?'#ff6b35':'#ff0055')+'">'+suppScore+'%</div>'
    +'<div style="font-size:10px;color:var(--text3);margin-top:2px">compliance rate</div>'
    +'</div>'

    +'<div style="padding:14px;background:var(--card);border:1px solid var(--border2);border-radius:12px;text-align:center">'
    +'<div style="font-size:9px;letter-spacing:2px;color:var(--text3);margin-bottom:6px;font-family:Impact,sans-serif">AVG SLEEP</div>'
    +'<div style="font-size:32px;font-family:Impact,sans-serif;color:'+(sleepAvg>=7?'#00ff88':sleepAvg>=6?'#ff6b35':sleepAvg?'#ff0055':'#444')+'">'+(sleepAvg?sleepAvg+'h':'--')+'</div>'
    +'<div style="font-size:10px;color:var(--text3);margin-top:2px">target: 8h</div>'
    +'</div>'

    +'</div>'

    // ── BP TREND ──
    +(bpReadings.length>0?
      '<div style="margin:0 16px 16px;padding:14px;background:var(--card);border:1px solid var(--border2);border-radius:12px;display:flex;justify-content:space-between;align-items:center">'
      +'<div>'
      +'<div style="font-size:9px;letter-spacing:2px;color:var(--text3);margin-bottom:4px;font-family:Impact,sans-serif">BLOOD PRESSURE TREND</div>'
      +'<div style="font-size:13px;color:'+bpTrendColor+'">'+bpTrendIcon+' '+bpTrend+'</div>'
      +'<div style="font-size:11px;color:var(--text3);margin-top:2px">'+bpReadings.length+' reading'+(bpReadings.length===1?'':'s')+' this week</div>'
      +'</div>'
      +'<div style="font-size:40px">❤️</div>'
      +'</div>'
    :'')

    // ── NEXT WEEK FOCUS ──
    +'<div style="margin:0 16px 16px;padding:14px;background:#0d0d1a;border:1px solid #1e1e2e;border-radius:12px">'
    +'<div style="font-size:10px;letter-spacing:2px;color:#6699ff;margin-bottom:10px;font-family:Impact,sans-serif">FOCUS FOR NEXT WEEK</div>'
    +(workoutScore<75?'<div style="font-size:12px;color:#ccc;padding:4px 0;border-bottom:1px solid #1a1a2a">💪 Hit all 4 training sessions — no skips</div>':'')
    +(cleanDays<5?'<div style="font-size:12px;color:#ccc;padding:4px 0;border-bottom:1px solid #1a1a2a">🧠 Stay clean every day — use the emergency protocol</div>':'')
    +(suppScore<70?'<div style="font-size:12px;color:#ccc;padding:4px 0;border-bottom:1px solid #1a1a2a">💊 Pack your pouches Sunday — supplements need to be visible</div>':'')
    +(!sleepAvg||sleepAvg<7?'<div style="font-size:12px;color:#ccc;padding:4px 0;border-bottom:1px solid #1a1a2a">😴 In bed by 11pm — testosterone is built during sleep</div>':'')
    +(workoutScore>=75&&cleanDays>=5&&suppScore>=70&&sleepAvg>=7?'<div style="font-size:13px;color:#00ff88;padding:4px 0">Everything is dialed. Raise the weights this week. Time to push harder.</div>':'')
    +'</div>'

    +'</div>'
    +'</div>';
}

function addJournalTodo(){
  var inp=document.getElementById('journalTodoInput');
  if(!inp||!inp.value.trim()) return;
  var today=todayStr(); var dd=getDD(today);
  if(!dd.morning) dd.morning={};
  if(!dd.morning.todos) dd.morning.todos=[];
  dd.morning.todos.push({text:inp.value.trim(),done:false,id:Date.now()});
  inp.value=''; saveDB();
  var c=document.getElementById('journalTodos');
  if(c) c.innerHTML=buildTodoHTML(today);
}
function toggleJournalTodo(id){
  var today=todayStr(); var dd=getDD(today);
  if(!dd.morning||!dd.morning.todos) return;
  var t=dd.morning.todos.find(function(x){return x.id==id;});
  if(t) t.done=!t.done; saveDB();
  var c=document.getElementById('journalTodos');
  if(c) c.innerHTML=buildTodoHTML(today);
}
function deleteJournalTodo(id){
  var today=todayStr(); var dd=getDD(today);
  if(!dd.morning||!dd.morning.todos) return;
  dd.morning.todos=dd.morning.todos.filter(function(x){return x.id!=id;}); saveDB();
  var c=document.getElementById('journalTodos');
  if(c) c.innerHTML=buildTodoHTML(today);
}
function buildTodoHTML(today){
  var dd=getDD(today); var todos=(dd.morning&&dd.morning.todos)||[];
  if(!todos.length) return '<div style=font-size:12px;color:var(--text3);padding:8px 0>No tasks yet.</div>';
  return todos.map(function(t){
    return '<div style=display:flex;align-items:center;gap:10px;padding:10px 12px;background:'+(t.done?'rgba(0,255,136,0.06)':'var(--card)')+';border:1px solid '+(t.done?'rgba(0,255,136,0.2)':'var(--border2)')+';border-radius:10px;margin-bottom:6px>'
      +'<div onclick=toggleJournalTodo('+t.id+') style=width:20px;height:20px;border-radius:50%;border:2px solid '+(t.done?'var(--green)':'var(--border2)')+';background:'+(t.done?'var(--green)':'transparent')+';cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center>'+(t.done?'<span style=font-size:10px;color:#000>check</span>':'')+'</div>'
      +'<div style=flex:1;font-size:13px;color:'+(t.done?'var(--text3)':'var(--text)')+'>'+(t.done?'<s>':'')+t.text+(t.done?'</s>':'')+'</div>'
      +'<div onclick=deleteJournalTodo('+t.id+') style=font-size:18px;color:var(--text3);cursor:pointer;padding:0 6px>x</div>'
      +'</div>';
  }).join('');
}

function launchConfetti(){
  if(document.getElementById('confetti-canvas')) return;
  var canvas=document.createElement('canvas');
  canvas.id='confetti-canvas';
  canvas.style.cssText='position:fixed;inset:0;z-index:8888;pointer-events:none;width:100%;height:100%';
  document.body.appendChild(canvas);
  var ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  var pieces=[];
  var colors=['#00ff88','#00D4FF','#ff4444','#ffcc00','#ff8c00','#aa88ff','#ff6699'];
  for(var k=0;k<120;k++){
    pieces.push({
      x:Math.random()*canvas.width, y:-10-Math.random()*200,
      w:6+Math.random()*8, h:4+Math.random()*6,
      r:Math.random()*Math.PI*2, rv:0.1+Math.random()*0.3,
      vx:-2+Math.random()*4, vy:2+Math.random()*5,
      color:colors[Math.floor(Math.random()*colors.length)],
      alpha:1
    });
  }
  var frame=0;
  var anim=setInterval(function(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    frame++;
    pieces.forEach(function(p){
      p.x+=p.vx; p.y+=p.vy; p.r+=p.rv;
      if(frame>80) p.alpha=Math.max(0,p.alpha-0.018);
      ctx.save();
      ctx.globalAlpha=p.alpha;
      ctx.translate(p.x+p.w/2,p.y+p.h/2);
      ctx.rotate(p.r);
      ctx.fillStyle=p.color;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
    if(frame>130){clearInterval(anim);canvas.remove();}
  },16);
}

setInterval(()=>{

      const diffMs=Date.now()-DB.lastSlip;
      const diffSecs=Math.floor(diffMs/1000);
      const days=Math.floor(diffSecs/86400);
      const hours=Math.floor((diffSecs%86400)/3600);
      const mins=Math.floor((diffSecs%3600)/60);
      const clockColor=days>=7?'#00ff88':days>=3?'#ff6b35':'#ff0055';
      const timeEl=clock.querySelector('div:nth-child(2)');
      if(timeEl){ timeEl.style.color=clockColor; timeEl.textContent=days+'d '+hours+'h '+mins+'m'; }
    }
  }
  // Bedtime check — fires once between 10pm and 11pm if not already shown today
  checkBedtimeAlarm();
  // Morning check — fires once between 6am and 9am
  checkMorningAlarm();
},60000);

function checkBedtimeAlarm(){
  const now = new Date();
  const hour = now.getHours();
  // Use date string — after midnight count as previous day's nag
  const nagDate = hour < 2 ? new Date(now.getTime()-86400000).toISOString().split('T')[0] : now.toISOString().split('T')[0];
  // Fire any time 10pm–2am
  if(hour>=22 || hour===0 || hour===1){
    if(DB.lastBedtimeNag === nagDate) return;
    DB.lastBedtimeNag = nagDate;
    saveDB();
    showBedtimeAlarm();
  }
}

function checkMorningAlarm(){
  const now = new Date();
  const hour = now.getHours();
  const today = now.toISOString().split('T')[0];
  if(hour>=6 && hour<9){
    if(DB.lastMorningAlarm === today) return;
    DB.lastMorningAlarm = today;
    saveDB();
    showMorningAlarm();
  }
}

var _AC=null;
function getAC(){if(!_AC)_AC=new(window.AudioContext||window.webkitAudioContext)();if(_AC.state==='suspended')_AC.resume();return _AC;}
function playTone(f,d,dur,v){try{var c=getAC(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(0,c.currentTime+d);g.gain.linearRampToValueAtTime(v||.35,c.currentTime+d+.01);g.gain.linearRampToValueAtTime(0,c.currentTime+d+dur);o.start(c.currentTime+d);o.stop(c.currentTime+d+dur+.05);}catch(e){}}
function playDone(){playTone(880,0,.22);playTone(1100,.24,.22);playTone(1320,.5,.28);playTone(1320,.84,.35);if(navigator.vibrate)navigator.vibrate([140,70,140,70,180]);}
function playTick(){playTone(660,0,.07,.15);}
var _OV=null;
function closeOV(){if(_OV){if(_OV._iv)clearInterval(_OV._iv);_OV.remove();_OV=null;}}
window.closeOV=closeOV;
function parseCooldownStretches(str){
  if(!str) return [];
  var parts = str.split(/\s*[\u00B7\u2022]\s*/);
  return parts.map(function(s){
    s = s.trim();
    if(!s) return null;
    var m = s.match(/(\d+)\s*(sec|min)/i);
    var secs = 30;
    if(m){
      secs = parseInt(m[1]) * (m[2].toLowerCase()[0]==="m" ? 60 : 1);
      if(s.toLowerCase().indexOf("each")>=0) secs = Math.min(secs*2, 180);
    }
    return {name:s, secs:secs};
  }).filter(Boolean);
}
function renderStretchTimers(cooldownStr){
  var stretches = parseCooldownStretches(cooldownStr);
  if(!stretches.length) return "";
  
  var rows = stretches.map(function(s){
    // Clean the name of any single quotes that might break the JS call
    var safeName = s.name.replace(/'/g, "\\'");
    return '<div class="stretch-row" onclick="startStretch(\'' + safeName + '\',' + s.secs + ')">'
      + '<div class="stretch-lbl">' + s.name + '</div>'
      + '<div class="stretch-time">' + s.secs + 's</div>'
      + '<button class="stretch-btn" onclick="event.stopPropagation();startStretch(\'' + safeName + '\',' + s.secs + ')">START</button>'
      + '<button class="stretch-btn" style="border-color:#ff6b35;color:#ff6b35" onclick="event.stopPropagation();startStretch(\'' + safeName + '\',' + (s.secs+30) + ')">+30s</button>'
      + '</div>';
  }).join("");

  var head = '<div class="stretch-timers">'
    + '<div class="stretch-timers-hdr">'
    + '<span style="font-size:10px;font-family:Impact,sans-serif;letter-spacing:2px;color:#aa88ff">⏱ STRETCH TIMERS</span>'
    + '<span style="font-size:10px;color:#444">stay in the app</span>'
    + '</div>';

  var quickButtons = '<div style="padding:8px 14px;border-bottom:1px solid #1a1228;display:flex;gap:8px">'
    + '<button class="stretch-btn" onclick="startStretch(\'Quick 30s\',30)">QUICK 30s</button>'
    + '<button class="stretch-btn" onclick="startStretch(\'Quick 60s\',60)">QUICK 60s</button>'
    + '</div>';

  var foot = '<div class="stretch-timers-hdr" style="display:none"></div>'
    + rows + '</div>';

  return head + quickButtons + foot;
}

function startStretch(name, totalSecs){
  closeOV();try{getAC();}catch(e){}
  var rem=totalSecs,paused=false;
  var ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.97);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box';
  _OV=ov;
  function col(){return rem/totalSecs>.5?'#aa88ff':rem/totalSecs>.25?'#ff6b35':'#ff0055';}
  function draw(){
    var C=2*Math.PI*56,off=(C*(1-rem/totalSecs)).toFixed(2),c=col();
    var mn=Math.floor(rem/60),sc=rem%60,t=mn?mn+':'+(sc<10?'0':'')+sc:''+rem;
    ov.innerHTML='<div style="text-align:center;width:100%;max-width:320px">'
      +'<div style="font-size:10px;letter-spacing:4px;color:var(--text3);font-family:Impact,sans-serif;margin-bottom:14px">STRETCH TIMER</div>'
      +'<div style="font-size:14px;color:#999;margin-bottom:22px;line-height:1.5;padding:0 8px">'+name+'</div>'
      +'<div style="position:relative;width:160px;height:160px;margin:0 auto 24px">'
      +'<svg width="160" height="160" style="position:absolute;inset:0;transform:rotate(-90deg)">'
      +'<circle cx="80" cy="80" r="56" stroke="#1a1a1a" stroke-width="10" fill="none"/>'
      +'<circle cx="80" cy="80" r="56" stroke="'+c+'" stroke-width="10" fill="none" stroke-dasharray="'+C.toFixed(2)+'" stroke-dashoffset="'+off+'" stroke-linecap="round" style="transition:stroke-dashoffset .9s linear,stroke .3s"/>'
      +'</svg>'
      +'<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">'
      +'<div style="font-size:50px;font-family:Impact,sans-serif;color:'+c+';line-height:1">'+t+'</div>'
      +'<div style="font-size:11px;color:var(--text3);font-family:Impact,sans-serif;letter-spacing:2px">'+(mn?'MIN':'SEC')+'</div>'
      +'</div></div>'
      +'<div style="display:flex;gap:12px;margin-bottom:16px">'
      +'<button id="_tp" style="flex:1;padding:15px;background:#1a0a2e;border:2px solid #aa88ff;border-radius:12px;color:#aa88ff;font-family:Impact,sans-serif;font-size:15px;cursor:pointer">'+(paused?'▶ RESUME':'⏸ PAUSE')+'</button>'
      +'<button onclick="closeOV()" style="flex:1;padding:15px;background:var(--card);border:2px solid #333;border-radius:12px;color:var(--text3);font-family:Impact,sans-serif;font-size:15px;cursor:pointer">✕ SKIP</button>'
      +'</div>'
      +'<div style="width:100%;height:4px;background:var(--card2);border-radius:2px;overflow:hidden">'
      +'<div style="height:100%;background:'+c+';width:'+Math.round((1-rem/totalSecs)*100)+'%;transition:width .9s linear"></div>'
      +'</div></div>';
    var pb=document.getElementById('_tp');
    if(pb)pb.onclick=function(){paused=!paused;draw();};
  }
  function tick(){
    if(paused)return;rem--;
    if(rem<=0){clearInterval(ov._iv);ov._iv=null;playDone();
      ov.innerHTML='<div style="text-align:center"><div style="font-size:80px;margin-bottom:20px">✅</div><div style="font-family:Impact,sans-serif;font-size:26px;letter-spacing:3px;color:#aa88ff;margin-bottom:10px">DONE</div><div style="font-size:13px;color:#666;margin-bottom:28px;line-height:1.5">'+name+'</div><button onclick="closeOV()" style="padding:16px 48px;background:#aa88ff;border:none;border-radius:12px;color:#000;font-family:Impact,sans-serif;font-size:16px;cursor:pointer">NEXT ▶</button></div>';
      return;}
    if(rem<=3)playTick();draw();
  }
  draw();document.body.appendChild(ov);ov._iv=setInterval(tick,1000);
}

function weightProgressAlert(equip, dayIdx, exIdx) {
  var today = todayStr();
  var todayD = new Date(today + 'T12:00:00');
  var weights = [];
  var sessions = 0;
  for (var d = 1; d <= 28 && sessions < 3; d++) {
    var dt = new Date(todayD);
    dt.setDate(dt.getDate() - d);
    var ds = dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
    var dayData = DB.days && DB.days[ds];
    if (!dayData) continue;
    var key = equip + '-' + dayIdx + '-' + exIdx;
    if (!dayData.ex || !dayData.ex[key]) continue;
    sessions++;
    var maxW = 0;
    for (var s = 0; s < 8; s++) {
      var w = parseFloat(dayData.w && dayData.w[key + '-p0-s' + s]);
      if (w && w > maxW) maxW = w;
    }
    if (maxW > 0) weights.push(maxW);
  }
  if (weights.length < 3) return '';
  if (weights[0] === weights[1] && weights[1] === weights[2]) {
    return '<span class="add-weight" onclick="showProgressionAlert(this)" data-w="'+weights[0]+'">↑ ADD WEIGHT</span>';
  }
  return '';
}

function renderMinoxTracker(today, dd) {
  var dow = new Date(today + 'T12:00:00').getDay();
  var dowNames = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  var dowKey = dowNames[dow];
  var isDermaDay = (dowKey === 'WED' || dowKey === 'SAT');

  // Streak — consecutive days with at least one application
  var streak = 0;
  var todayD = new Date(today + 'T12:00:00');
  for (var d = 1; d <= 60; d++) {
    var dt = new Date(todayD);
    dt.setDate(dt.getDate() - d);
    var ds = dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
    var prev = DB.days && DB.days[ds];
    if (prev && prev.minox && (prev.minox.am || prev.minox.pm)) {
      streak++;
    } else {
      break;
    }
  }

  // 14-day history dots
  var dots = '';
  for (var i = 13; i >= 0; i--) {
    var dt2 = new Date(todayD);
    dt2.setDate(dt2.getDate() - i);
    var ds2 = dt2.getFullYear() + '-' + String(dt2.getMonth()+1).padStart(2,'0') + '-' + String(dt2.getDate()).padStart(2,'0');
    var ddata = DB.days && DB.days[ds2];
    var hasBoth = ddata && ddata.minox && ddata.minox.am && ddata.minox.pm;
    var hasOne  = ddata && ddata.minox && (ddata.minox.am || ddata.minox.pm);
    var isToday = (ds2 === today);
    var bg = hasBoth ? '#9966ff' : hasOne ? '#4a2a7a' : '#1a1a1a';
    var bdr = isToday ? '#ff6b35' : '#222';
    dots += '<div style="width:18px;height:18px;border-radius:4px;background:' + bg + ';border:1px solid ' + bdr + '"></div>';
  }

  var amDone  = !!(dd.minox && dd.minox.am);
  var pmDone  = !!(dd.minox && dd.minox.pm);
  var dermaDone = !!(dd.minox && dd.minox.derma);

  function row(key, icon, label, note, color, done) {
    return '<div class="minox-row" onclick="toggleMinox(\'' + today + '\',\'' + key + '\')">'
      + '<div class="minox-chk' + (done ? ' on' : '') + '"></div>'
      + '<div style="flex:1"><div style="font-size:13px;' + (done ? 'color:var(--text3);text-decoration:line-through' : 'color:#ccc') + '">' + icon + ' ' + label + '</div>'
      + '<div style="font-size:11px;color:var(--text3);margin-top:2px">' + note + '</div></div>'
      + '</div>';
  }

  var rows = row('am', '🌅', 'Morning application', 'Damp skin. Half cap foam. 4h+ before sleep.', '#9966ff', amDone);
  if (isDermaDay) {
    rows += row('derma', '🩸', 'DERMAROLLER TONIGHT', '0.5mm roller. Roll before bed. SKIP PM Minox tonight.', '#ff6b35', dermaDone);
  } else {
    rows += row('pm', '🌙', 'Evening application', 'Damp skin. Half cap foam. Beard oil after absorbs.', '#9966ff', pmDone);
  }

  var warning = isDermaDay
    ? '<div style="padding:8px 16px;background:#1a0800;border-top:1px solid #2a1a0a;font-size:11px;color:#ff6b35">⚠️ Dermaroller night — skip PM Minox, apply tomorrow morning instead</div>'
    : '';

  return '<div class="minox-wrap">'
    + '<div class="minox-head">'
    + '<div>'
    + '<div style="font-size:12px;font-family:Impact,sans-serif;letter-spacing:1px;color:#9966ff">🧴 MINOXIDIL + DERMAROLLER</div>'
    + '<div style="font-size:10px;color:var(--text3);margin-top:2px">' + dowKey + (isDermaDay ? ' · DERMAROLLER DAY' : ' · Standard day') + '</div>'
    + '</div>'
    + '<div style="text-align:right">'
    + '<div style="font-size:24px;font-family:Impact,sans-serif;color:#9966ff">' + streak + '</div>'
    + '<div style="font-size:9px;color:var(--text3);letter-spacing:1px">DAY STREAK</div>'
    + '</div>'
    + '</div>'
    + rows
    + warning
    + '<div style="padding:10px 16px">'
    + '<div style="font-size:9px;color:var(--text3);letter-spacing:1px;margin-bottom:6px">LAST 14 DAYS</div>'
    + '<div style="display:flex;gap:3px">' + dots + '</div>'
    + '<div style="display:flex;gap:12px;margin-top:6px;font-size:10px;color:#555">'
    + '<span><span style="display:inline-block;width:10px;height:10px;background:#9966ff;border-radius:2px;margin-right:4px"></span>Both</span>'
    + '<span><span style="display:inline-block;width:10px;height:10px;background:#4a2a7a;border-radius:2px;margin-right:4px"></span>One</span>'
    + '<span><span style="display:inline-block;width:10px;height:10px;background:var(--card2);border:1px solid #333;border-radius:2px;margin-right:4px"></span>Missed</span>'
    + '</div>'

// ═══════════════════════════════════════════════════════════
// KEGEL SESSION — self-contained visual timer
// One call runs ALL exercises back to back. No queue. No callbacks.
// ═══════════════════════════════════════════════════════════
function startFullKegelSession(today) {
  today = today || window._kegelToday || todayStr();
  // Build exercise list directly from today's plan
  var d = new Date(today + 'T12:00:00');
  var dayIdx = ((d.getDay() + 6) % 7) % KEGEL_DAILY_PLAN.length;
  var exIds = KEGEL_DAILY_PLAN[dayIdx] || KEGEL_DAILY_PLAN[0];
  var level = DB.kegelLevel || 'easy';
  var exercises = exIds.map(function(id) {
    return KEGEL_EXERCISES.find(function(e) { return e.id === id; });
  }).filter(Boolean);

  if (!exercises.length) { alert('No exercises for today'); return; }

  var exIdx = 0;   // which exercise we are on
  var set = 1;     // current set
  var rep = 1;     // current rep
  var phase = 'intro'; // intro | squeeze | release | set-rest | ex-rest | done
  var timeLeft = 3; // intro countdown
  var paused = false;
  var iv = null;
  var ov = document.createElement('div');
  ov.id = 'kegel-session-overlay';
  document.body.appendChild(ov);

  function ex()  { return exercises[exIdx]; }
  function cfg() { return ex().levels[level] || ex().levels.easy; }
  function totalReps() { return cfg().sets * cfg().reps; }
  function doneReps()  { return (set - 1) * cfg().reps + (rep - 1); }

  function bgColor() {
    if (phase === 'squeeze')  return 'rgba(0,212,255,0.08)';
    if (phase === 'release')  return 'rgba(102,153,255,0.08)';
    if (phase === 'set-rest') return 'rgba(0,0,0,0)';
    return 'rgba(0,0,0,0)';
  }

  function ringColor() {
    if (phase === 'squeeze')  return '#00D4FF';
    if (phase === 'release')  return '#6699ff';
    if (phase === 'set-rest') return '#444';
    return '#00ff88';
  }

  function maxTime() {
    if (phase === 'squeeze')  return cfg().squeeze;
    if (phase === 'release')  return cfg().release;
    if (phase === 'set-rest') return 10;
    if (phase === 'ex-rest')  return 5;
    if (phase === 'intro')    return 3;
    return 1;
  }

  function bigLabel() {
    if (phase === 'intro')    return Math.ceil(timeLeft);
    if (phase === 'squeeze')  return Math.ceil(timeLeft);
    if (phase === 'release')  return Math.ceil(timeLeft);
    if (phase === 'set-rest') return Math.ceil(timeLeft);
    if (phase === 'ex-rest')  return Math.ceil(timeLeft);
    return '✓';
  }

  function instruction() {
    if (phase === 'intro')    return '🛡️ GET READY';
    if (phase === 'squeeze')  return '🔒 SQUEEZE — HOLD TIGHT';
    if (phase === 'release')  return '🔓 RELEASE — LET GO FULLY';
    if (phase === 'set-rest') return '💤 REST — NEXT SET COMING';
    if (phase === 'ex-rest')  return '💤 REST — NEXT EXERCISE';
    return '🔥 DONE!';
  }

  function instrColor() {
    if (phase === 'squeeze') return '#00D4FF';
    if (phase === 'release') return '#6699ff';
    return 'var(--text3)';
  }

  function draw() {
    var C = 2 * Math.PI * 70;
    var pct = Math.max(0, timeLeft / maxTime());
    var offset = C * (1 - pct);
    var totalEx = exercises.length;
    var progressPct = totalEx > 1 ? Math.round(exIdx / totalEx * 100) : Math.round(doneReps() / totalReps() * 100);

    ov.innerHTML =
      '<div style="position:fixed;inset:0;background:rgba(2,6,16,0.98);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;transition:background 0.3s;' + (phase==='squeeze'?'background:rgba(0,20,40,0.98)':phase==='release'?'background:rgba(8,8,30,0.98)':'') + '">'

      // Exercise name + level
      + '<div style="text-align:center;margin-bottom:8px">'
      + '<div style="font-size:24px;margin-bottom:4px">' + ex().emoji + '</div>'
      + '<div style="font-size:13px;font-family:Impact,sans-serif;letter-spacing:3px;color:var(--text)">' + ex().name.toUpperCase() + '</div>'
      + '<div style="font-size:10px;color:var(--text3);letter-spacing:1px;margin-top:2px">' + level.toUpperCase().replace('SEXGOD','SEX GOD') + ' · SET ' + set + '/' + cfg().sets + ' · REP ' + rep + '/' + cfg().reps + '</div>'
      + '</div>'

      // Big ring
      + '<div style="position:relative;width:180px;height:180px;margin:16px 0">'
      + '<svg width="180" height="180" style="transform:rotate(-90deg)">'
      + '<circle cx="90" cy="90" r="70" fill="none" stroke="#0a1020" stroke-width="10"/>'
      + '<circle cx="90" cy="90" r="70" fill="none" stroke="' + ringColor() + '" stroke-width="10" stroke-linecap="round"'
      + ' stroke-dasharray="' + C + '" stroke-dashoffset="' + offset + '"'
      + ' style="transition:stroke-dashoffset 0.08s linear;filter:drop-shadow(0 0 8px ' + ringColor() + ')"/>'
      + '</svg>'
      + '<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">'
      + '<div style="font-size:52px;font-family:Impact,sans-serif;color:' + ringColor() + ';line-height:1;text-shadow:0 0 20px ' + ringColor() + '">' + bigLabel() + '</div>'
      + '<div style="font-size:9px;letter-spacing:3px;color:var(--text3);margin-top:4px">' + (phase==='intro'?'READY':phase==='set-rest'||phase==='ex-rest'?'REST':'SECONDS') + '</div>'
      + '</div>'
      + '</div>'

      // Instruction bar
      + '<div style="font-size:15px;font-family:Impact,sans-serif;letter-spacing:2px;color:' + instrColor() + ';text-align:center;margin-bottom:20px;min-height:24px">' + instruction() + '</div>'

      // Progress bar across all exercises
      + '<div style="width:240px;background:#0a1020;border-radius:4px;height:4px;margin-bottom:20px;overflow:hidden">'
      + '<div style="height:100%;width:' + progressPct + '%;background:var(--cyan);border-radius:4px;transition:width 0.3s"></div>'
      + '</div>'

      // Controls
      + '<div style="display:flex;gap:12px">'
      + '<button onclick="window._kegelTogglePause()" style="padding:12px 28px;background:rgba(255,255,255,0.06);border:1px solid #2a2a3a;border-radius:10px;color:var(--text2);font-family:Impact,sans-serif;font-size:13px;letter-spacing:1px;cursor:pointer">' + (paused ? '▶ RESUME' : '⏸ PAUSE') + '</button>'
      + '<button onclick="window._kegelAbort()" style="padding:12px 28px;background:rgba(255,0,60,0.08);border:1px solid rgba(255,0,60,0.3);border-radius:10px;color:#ff0055;font-family:Impact,sans-serif;font-size:13px;letter-spacing:1px;cursor:pointer">✕ STOP</button>'
      + '</div>'

      + '</div>';
  }

  function nextPhase() {
    if (phase === 'intro') {
      phase = 'squeeze';
      timeLeft = cfg().squeeze;
      return;
    }
    if (phase === 'squeeze') {
      phase = 'release';
      timeLeft = cfg().release;
      return;
    }
    if (phase === 'release') {
      // finished one rep
      if (rep < cfg().reps) {
        rep++;
        phase = 'squeeze';
        timeLeft = cfg().squeeze;
      } else {
        // finished all reps in this set
        if (set < cfg().sets) {
          set++;
          rep = 1;
          phase = 'set-rest';
          timeLeft = 10;
        } else {
          // finished all sets — move to next exercise or done
          exIdx++;
          if (exIdx < exercises.length) {
            set = 1; rep = 1;
            phase = 'ex-rest';
            timeLeft = 5;
          } else {
            phase = 'done';
            finishSession();
          }
        }
      }
      return;
    }
    if (phase === 'set-rest') {
      phase = 'squeeze';
      timeLeft = cfg().squeeze;
      return;
    }
    if (phase === 'ex-rest') {
      phase = 'squeeze';
      timeLeft = cfg().squeeze;
      return;
    }
  }

  function finishSession() {
    clearInterval(iv);
    markKegelDone(today);
    ov.innerHTML =
      '<div style="position:fixed;inset:0;background:rgba(2,6,16,0.98);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center">'
      + '<div style="font-size:64px;margin-bottom:16px">🔥</div>'
      + '<div style="font-size:28px;font-family:Impact,sans-serif;color:#00D4FF;letter-spacing:3px;margin-bottom:8px">SESSION COMPLETE</div>'
      + '<div style="font-size:13px;color:var(--text2);margin-bottom:4px">' + exercises.length + ' exercise' + (exercises.length>1?'s':'') + ' · ' + level.toUpperCase().replace('SEXGOD','SEX GOD') + '</div>'
      + '<div style="font-size:12px;color:var(--text3);margin-bottom:28px">Day streak: ' + getKegelStreak() + '</div>'
      + '<button onclick="document.getElementById(\'kegel-session-overlay\').remove();render()" style="padding:16px 40px;background:rgba(0,212,255,0.12);border:1.5px solid #00D4FF;border-radius:12px;color:#00D4FF;font-family:Impact,sans-serif;font-size:16px;letter-spacing:3px;cursor:pointer;box-shadow:0 0 20px rgba(0,212,255,0.2)">DONE 💪</button>'
      + '</div>';
  }

  function tick() {
    if (paused || phase === 'done') return;
    timeLeft -= 0.1;
    if (timeLeft <= 0) {
      timeLeft = 0;
      nextPhase();
    }
    draw();
  }

  window._kegelTogglePause = function() { paused = !paused; draw(); };
  window._kegelAbort = function() {
    clearInterval(iv);
    ov.remove();
    render();
  };

  draw();
  iv = setInterval(tick, 100);
}




function showKegelRest(seconds, onDone) {
  var ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(7,14,26,0.97);z-index:9998;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center';
  document.body.appendChild(ov);
  var t = seconds;
  var R=60, C=2*Math.PI*R;
  function draw() {
    var offset = C*(t/seconds);
    ov.innerHTML = '<div style="font-size:11px;letter-spacing:3px;color:var(--text3);font-family:Impact,sans-serif;margin-bottom:20px">NEXT EXERCISE IN</div>'
      + '<div style="position:relative;width:160px;height:160px;margin:0 auto 20px">'

      + '<circle cx="80" cy="80" r="'+R+'" fill="none" stroke="rgba(28,45,66,0.8)" stroke-width="8"/>'
      + '<circle cx="80" cy="80" r="'+R+'" fill="none" stroke="var(--cyan)" stroke-width="8" stroke-linecap="round" stroke-dasharray="'+C+'" stroke-dashoffset="'+offset+'" style="filter:drop-shadow(0 0 8px rgba(0,212,255,0.7))"/>'
      + '</svg>'
      + '<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">'
      + '<div style="font-size:56px;font-family:Impact,sans-serif;color:var(--cyan);line-height:1">'+t+'</div>'
      + '<div style="font-size:10px;color:var(--text3);letter-spacing:2px;margin-top:4px">REST</div>'
      + '</div></div>'
      + '<div style="font-size:13px;color:var(--text2);font-style:italic">Breathe. Next exercise loading.</div>';
  }
  draw();
  var iv = setInterval(function() {
    t--;
    if (t <= 0) { clearInterval(iv); ov.remove(); onDone(); }
    else { draw(); if (navigator.vibrate) navigator.vibrate(30); }
  }, 1000);
}
