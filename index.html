function setPomSubject(n){ DB.pomodoroSubject=n; saveDB(); render(); }
function setPomWork(d){ DB.pomodoroWork=Math.max(5,Math.min(60,(DB.pomodoroWork||25)+d)); saveDB(); render(); }
function setPomBreak(d){ DB.pomodoroBreak=Math.max(5,Math.min(30,(DB.pomodoroBreak||5)+d)); saveDB(); render(); }
function startPomodoro() {
  var wm=DB.pomodoroWork||25,bm=DB.pomodoroBreak||5;
  var sub=DB.pomodoroSubject||NAPLEX_SUBJECTS[0].name;
  var sd=NAPLEX_SUBJECTS.find(function(s){return s.name===sub;})||NAPLEX_SUBJECTS[0];
  var phase='work',secs=wm*60,paused=false;
  var ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(7,16,30,0.97);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px';
  function draw(){
    var mins=Math.floor(secs/60),s=secs%60,tot=phase==='work'?wm*60:bm*60,prog=secs/tot,C=2*Math.PI*80,col=phase==='work'?sd.color:'#6699ff';
    ov.innerHTML='<div style="text-align:center">'
      +'<div style="font-size:9px;letter-spacing:3px;color:var(--text3);font-family:Impact,sans-serif;margin-bottom:8px">'+sd.emoji+' '+sub.toUpperCase()+'</div>'
      +'<div style="font-size:11px;letter-spacing:2px;color:'+col+';font-family:Impact,sans-serif;margin-bottom:20px">'+(phase==='work'?'📚 FOCUS TIME':'☕ BREAK TIME')+'</div>'
      +'<div style="position:relative;width:200px;height:200px;margin:0 auto 24px">'
      +'<svg width="200" height="200" style="transform:rotate(-90deg)">'
      +'<circle cx="100" cy="100" r="80" fill="none" stroke="rgba(28,45,66,0.9)" stroke-width="8"/>'
      +'<circle cx="100" cy="100" r="80" fill="none" stroke="'+col+'" stroke-width="8" stroke-linecap="round" stroke-dasharray="'+C+'" stroke-dashoffset="'+(C*(1-prog))+'" style="filter:drop-shadow(0 0 6px '+col+')"/>'
      +'</svg>'
      +'<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">'
      +'<div style="font-size:52px;font-family:Impact,sans-serif;color:'+col+';line-height:1">'+String(mins).padStart(2,'0')+':'+String(s).padStart(2,'0')+'</div>'
      +'<div style="font-size:10px;color:var(--text3);letter-spacing:1px;margin-top:4px">'+(phase==='work'?'FOCUS':'REST')+'</div>'
      +'</div></div>'
      +'<div style="display:flex;gap:12px">'
      +'<button onclick="window._pomP()" style="flex:1;padding:14px;background:var(--card);border:1px solid var(--border2);border-radius:10px;color:var(--text2);font-family:Impact,sans-serif;font-size:13px;cursor:pointer">'+(paused?'▶ RESUME':'⏸ PAUSE')+'</button>'
      +'<button onclick="window._pomS()" style="flex:1;padding:14px;background:rgba(26,8,16,0.8);border:1px solid rgba(255,45,85,0.4);border-radius:10px;color:var(--red);font-family:Impact,sans-serif;font-size:13px;cursor:pointer">✕ STOP</button>'
      +'</div></div>';
  }
  if(_pomIv)clearInterval(_pomIv);
  _pomIv=setInterval(function(){
    if(paused)return; secs--;
    if(secs<=0){
      if(phase==='work'){
        if(!DB.pomodoroSessions)DB.pomodoroSessions=[];
        DB.pomodoroSessions.push({date:todayStr(),subject:sub,completed:true,time:new Date().toTimeString().slice(0,5)});
        saveDB(); phase='break'; secs=bm*60;
      } else { clearInterval(_pomIv); ov.remove(); render(); return; }
    }
    draw();
  },1000);
  document.body.appendChild(ov); draw();
  window._pomP=function(){ paused=!paused; draw(); };
  window._pomS=function(){ clearInterval(_pomIv); ov.remove(); render(); };
}

function tickClean(section,idx,delta,evt) {
  var today=todayStr(),dd=getDD(today);
  if(!dd.cleaning)dd.cleaning={room:{},car:{}};
  if(!dd.cleaning[section])dd.cleaning[section]={};
  var task=CLEAN_TASKS[section][idx];
  var cur=dd.cleaning[section][idx]||0;
  var next=Math.max(0,cur+delta);
  if(task.max)next=Math.min(task.max,next);
  dd.cleaning[section][idx]=next;
  saveDB();
  if(delta>0&&navigator.vibrate)navigator.vibrate(30);
  if(delta>0&&evt){
    var el=document.createElement('div');
    el.className='float-plus';el.textContent='+1';
    var cx=evt.changedTouches?evt.changedTouches[0].clientX:evt.clientX;
    var cy=evt.changedTouches?evt.changedTouches[0].clientY:evt.clientY;
    el.style.left=(cx-15)+'px';el.style.top=(cy-20)+'px';
    document.body.appendChild(el);
    setTimeout(function(){el.remove();},800);
  }
  render();
}

// Compute current progress for each goal
function getGoalProgress(goalId) {
  if(!DB.goals) DB.goals = {};
  // Auto-compute from existing tracking where possible
  switch(goalId) {
    case 'gym':
      // Count workout-status completions (fallback: exercise volume)
      var gymCount = Object.keys(DB.days||{}).filter(function(ds){
        if(ds < '2026-03-15') return false;
        var d=DB.days[ds]||{};
        var dayIdx=['MON','TUE','WED','THU','FRI'].indexOf(getDowStr(ds));
        var st = dayIdx>=0 && d.rec ? (d.rec['workout-status-'+dayIdx]||'') : '';
        if(st.indexOf('completed')===0 || st.indexOf('partial')===0) return true;
        return d.ex&&Object.keys(d.ex).length>2;
      }).length;
      return Math.max(gymCount, DB.goals['gym']||0);
    case 'french':
      // Auto-count from journal french entries + manual
      var frCount = Object.keys(DB.days||{}).filter(function(ds){
        if(ds < '2026-03-15') return false;
        var d=DB.days[ds]; return d&&d.french&&d.french.done;
      }).length;
      return Math.max(frCount, DB.goals['french']||0);
    case 'discipline':
      // Count days with score > 60% since Mar 15
      var discCount = Object.keys(DB.days||{}).filter(function(ds){
        if(ds < '2026-03-15') return false;
        var d=DB.days[ds]||{};
        return computeDailyWinScore(ds,d) >= 60;
      }).length;
      return Math.max(discCount, DB.goals['discipline']||0);
    default:
      return DB.goals[goalId]||0;
  }
}

function tickGoal(goalId, delta) {
  if (delta === undefined) delta = 1;
  if (!DB.goalTicks) DB.goalTicks = {};
  DB.goalTicks[goalId] = Math.max(0, (DB.goalTicks[goalId]||0) + delta);
  saveDB();
  render();
  if (navigator.vibrate) navigator.vibrate(delta > 0 ? 40 : 15);
}

function submitForcedLog() {
  var today = todayStr();
  var dd = getDD(today);
  var shEl = document.getElementById('fl-sleep-h');
  var sysEl = document.getElementById('fl-bp-sys');
  var diaEl = document.getElementById('fl-bp-dia');
  var sh = shEl ? parseFloat(shEl.value) : NaN;
  var sys = sysEl ? parseInt(sysEl.value) : NaN;
  var dia = diaEl ? parseInt(diaEl.value) : NaN;
  if (!isNaN(sh) && sh > 0) { dd.sleep = {hours: sh, quality: sh >= 7 ? 'good' : sh >= 5 ? 'okay' : 'poor'}; }
  if (!isNaN(sys) && !isNaN(dia) && sys > 60 && dia > 40) {
    var now = new Date();
    var t = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    if (!dd.bp) dd.bp = {};
    dd.bp[t] = sys + '/' + dia;
  }
  saveDB();
  var modal = document.getElementById('forced-log-modal');
  if (modal) { modal.style.opacity='0'; modal.style.transition='opacity 0.3s'; setTimeout(function(){modal.remove();},300); }
  render();
}

function dismissForcedLog() {
  var modal = document.getElementById('forced-log-modal');
  if (modal) modal.remove();
}

// STARFIELD BACKGROUND
// ═══════════════════════════════════════════════════════════
function initStarfield() {
  var existing = document.getElementById("space-canvas");
  if (existing) return;
  var canvas = document.createElement("canvas");
  canvas.id = "space-canvas";
  document.body.insertBefore(canvas, document.body.firstChild);
  var ctx = canvas.getContext("2d");
  var stars = [];
  function resize() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
  resize();
  window.addEventListener("resize", resize);
  for(var i=0;i<180;i++) {
    stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.4+0.2,s:Math.random()*0.6+0.2,p:Math.random()*Math.PI*2,sp:0.003+Math.random()*0.008});
  }
  // Occasional bright stars
  for(var j=0;j<12;j++) {
    stars.push({x:Math.random(),y:Math.random(),r:Math.random()*2.5+1.5,s:0.9,p:Math.random()*Math.PI*2,sp:0.002,bright:true});
  }
  var lowPower = isPowerSaveEnabled() || (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
  function draw() {
    var W=canvas.width, H=canvas.height;
    ctx.clearRect(0,0,W,H);
    // Nebula glow blobs
    var nb=[{x:0.2,y:0.3,r:0.25,c:"rgba(0,40,80,0.12)"},{x:0.8,y:0.7,r:0.3,c:"rgba(20,0,60,0.1)"},{x:0.5,y:0.1,r:0.2,c:"rgba(0,60,40,0.08)"}];
    nb.forEach(function(n){var g=ctx.createRadialGradient(n.x*W,n.y*H,0,n.x*W,n.y*H,n.r*W);g.addColorStop(0,n.c);g.addColorStop(1,"transparent");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);});
    stars.forEach(function(s) {
      s.p+=s.sp;
      var op=s.s*(0.5+0.5*Math.sin(s.p));
      ctx.beginPath();
      ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
      if(s.bright){
        ctx.fillStyle="rgba(180,230,255,"+op+")";
        ctx.shadowColor="rgba(0,212,255,"+op*0.8+")";
        ctx.shadowBlur=6;
      } else {
        ctx.fillStyle="rgba(200,220,255,"+op+")";
        ctx.shadowBlur=0;
      }
      ctx.fill();
    });
    ctx.shadowBlur=0;
    if (!lowPower) requestAnimationFrame(draw);
  }
  draw();
}

// ═══════════════════════════════════════════════════════════
function getWeekKey(dateStr) {
  var d=new Date(dateStr+"T12:00:00");
  var dow=d.getDay(); var off=dow===0?-6:-(dow-1);
  var mon=new Date(d); mon.setDate(d.getDate()+off);
  return mon.getFullYear()+"-"+String(mon.getMonth()+1).padStart(2,"0")+"-"+String(mon.getDate()).padStart(2,"0");
}

function checkWeeklyCheckIn() {
  var today=todayStr();
  var d=new Date(today+"T12:00:00");
  var isSunday=d.getDay()===0;
  if(!isSunday) return;
  var wk=getWeekKey(today);
  if(!DB.weeklyCheckIns) DB.weeklyCheckIns={};
  if(DB.weeklyCheckIns[wk] && DB.weeklyCheckIns[wk].done) return;
  setTimeout(function(){ showWeeklyCheckIn(today, wk); }, 2000);
}

function showWeeklyCheckIn(today, wk) {
  var existing=document.getElementById("weekly-modal");
  if(existing) existing.remove();

  // Compute weekly stats
  var stats=computeWeekStats(today);

  var ov=document.createElement("div");
  ov.id="weekly-modal";
  ov.className="weekly-modal";

  var statsHtml=
    "<div class='weekly-stat'><span style='font-size:12px;color:var(--text3)'>Workouts</span><span style='font-family:Impact;color:var(--green)'>" +stats.workouts+"/7</span></div>"
    +"<div class='weekly-stat'><span style='font-size:12px;color:var(--text3)'>Clean days</span><span style='font-family:Impact;color:var(--cyan)'>" +stats.cleanDays+"/7</span></div>"
    +"<div class='weekly-stat'><span style='font-size:12px;color:var(--text3)'>Supplements</span><span style='font-family:Impact;color:var(--orange)'>" +stats.suppPct+"%</span></div>"
    +"<div class='weekly-stat'><span style='font-size:12px;color:var(--text3)'>Sleep avg</span><span style='font-family:Impact;color:#6699FF'>" +stats.sleepAvg+"h</span></div>"
    +"<div class='weekly-stat'><span style='font-size:12px;color:var(--text3)'>Avg score</span><span style='font-family:Impact;color:var(--cyan)'>" +stats.avgScore+"%</span></div>";

  ov.innerHTML=
    "<div class='weekly-card'>"
    +"<div style='text-align:center;margin-bottom:28px;padding-top:12px'>"
    +"<div style='font-size:36px;margin-bottom:8px'>📋</div>"
    +"<div style='font-size:22px;font-family:Impact,sans-serif;letter-spacing:3px;color:var(--text)'>WEEKLY CHECK-IN</div>"
    +"<div style='font-size:12px;color:var(--text3);margin-top:6px'>Honest reflection. No bullshit.</div>"
    +"</div>"
    // Stats summary
    +"<div style='background:rgba(10,20,40,0.9);border:1px solid rgba(0,212,255,0.15);border-radius:16px;padding:16px;margin-bottom:16px'>"
    +"<div style='font-size:9px;letter-spacing:3px;color:var(--cyan);font-family:Impact,sans-serif;margin-bottom:12px'>THIS WEEK BY THE NUMBERS</div>"
    +statsHtml

    +"<div style='font-size:9px;letter-spacing:2px;color:var(--green);font-family:Impact,sans-serif;margin-bottom:8px'>01 — BIGGEST WIN</div>"

    +"<textarea id='wk-q1' placeholder='Be specific. What happened that you are proud of?' maxlength='500'></textarea>"
    +"</div>"

    +"<div class='weekly-q'>"
    +"<div style='font-size:9px;letter-spacing:2px;color:var(--red);font-family:Impact,sans-serif;margin-bottom:8px'>02 — WHAT YOU AVOIDED</div>"

    +"</div>"

    +"<div class='weekly-q'>"
    +"<div style='font-size:9px;letter-spacing:2px;color:var(--orange);font-family:Impact,sans-serif;margin-bottom:8px'>03 — ONE LOCK-IN NEXT WEEK</div>"

function computeWeekStats(today) {
  var d=new Date(today+"T12:00:00");
  var dow=d.getDay(); var off=dow===0?-6:-(dow-1);
  var workouts=0,cleanDays=0,suppTotal=0,suppDone=0,sleepSum=0,sleepCount=0,scoreSum=0,scoreCt=0;
  for(var i=0;i<7;i++){
    var dt=new Date(d); dt.setDate(d.getDate()+off+i);
    var ds=dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");
    var dd2=DB.days&&DB.days[ds]||{};
    if(dd2.ex&&Object.keys(dd2.ex).length>2) workouts++;
    if(dd2.sex&&dd2.sex["porn-status"]==="clean") cleanDays++;
    var sc=Object.values(dd2.supp||{}).filter(Boolean).length;
    suppDone+=sc; suppTotal+=SUPPLEMENTS?SUPPLEMENTS.length:10;
    if(dd2.sleep&&dd2.sleep.hours){sleepSum+=dd2.sleep.hours;sleepCount++;}
    var score=computeDailyWinScore(ds,dd2);
    if(score>0){scoreSum+=score;scoreCt++;}
  }
  return {
    workouts:workouts,
    cleanDays:cleanDays,
    suppPct:suppTotal>0?Math.round(suppDone/suppTotal*100):0,
    sleepAvg:sleepCount>0?Math.round(sleepSum/sleepCount*10)/10:0,
    avgScore:scoreCt>0?Math.round(scoreSum/scoreCt):0
  };
}

function submitWeeklyCheckIn(wk) {
  var q1=document.getElementById("wk-q1");
  var q2=document.getElementById("wk-q2");
  var q3=document.getElementById("wk-q3");
  if(!q1||!q2||!q3) return;
  if(!q1.value.trim()&&!q2.value.trim()&&!q3.value.trim()){
    q1.style.border="1px solid var(--red)";
    q1.placeholder="Fill in at least one answer.";
    return;
  }
  if(!DB.weeklyCheckIns) DB.weeklyCheckIns={};
  DB.weeklyCheckIns[wk]={
    done:true,
    date:todayStr(),
    win:q1.value.trim(),
    avoided:q2.value.trim(),
    commit:q3.value.trim(),
    stats:computeWeekStats(todayStr())
  };
  saveDB();
  var modal=document.getElementById("weekly-modal");
  if(modal){modal.style.opacity="0";modal.style.transition="opacity 0.3s";setTimeout(function(){modal.remove();},300);}
  // Flash confirmation
  var toast=document.createElement("div");
  toast.style.cssText="position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,255,136,0.15);border:1px solid var(--green);border-radius:12px;padding:14px 24px;color:var(--green);font-family:Impact,sans-serif;font-size:13px;letter-spacing:2px;z-index:9999;transition:opacity 0.5s;";
  toast.textContent="WEEK LOCKED IN";
  document.body.appendChild(toast);
  setTimeout(function(){toast.style.opacity="0";setTimeout(function(){toast.remove();},500);},2000);
}

function renderWeeklyHistory() {
  var entries=Object.entries(DB.weeklyCheckIns||{}).sort(function(a,b){return b[0]>a[0]?1:-1;});
  if(!entries.length) return "<div style='padding:20px;text-align:center;color:var(--text3);font-size:13px'>No weekly check-ins yet. They appear every Sunday.</div>";
  return entries.slice(0,12).map(function(entry){
    var wk=entry[0]; var d=entry[1];
    if(!d.done) return "";
    return "<div class='wk-hist-entry'>"
      +"<div style='font-size:9px;letter-spacing:2px;color:var(--cyan);font-family:Impact,sans-serif;margin-bottom:10px'>WEEK OF " +wk+ " · AVG " +(d.stats?d.stats.avgScore:"?")+ "%</div>"
      +(d.win?"<div style='margin-bottom:8px'><span style='font-size:9px;color:var(--green);letter-spacing:1px;font-family:Impact,sans-serif'>WIN: </span><span style='font-size:12px;color:var(--text2)'>" +d.win+ "</span></div>":"") 
      +(d.avoided?"<div style='margin-bottom:8px'><span style='font-size:9px;color:var(--red);letter-spacing:1px;font-family:Impact,sans-serif'>AVOIDED: </span><span style='font-size:12px;color:var(--text2)'>" +d.avoided+ "</span></div>":"") 
      +(d.commit?"<div><span style='font-size:9px;color:var(--orange);letter-spacing:1px;font-family:Impact,sans-serif'>COMMITTED: </span><span style='font-size:12px;color:var(--text2)'>" +d.commit+ "</span></div>":"") 
      +"</div>";
  }).join("");
}

  html += '</div>';
  return html;
}

  return '<div style="padding-bottom:100px">' + sysHtml + comboNav + comboCard + safetyHtml + progressHtml + '</div>';

function startComboTimer(seconds, comboName) {
  var existing = document.getElementById('combo-timer-overlay');
  if(existing) existing.remove();
  var timeLeft = seconds;
  var paused = false;
  var iv = null;
  var ov = document.createElement('div');
  ov.id = 'combo-timer-overlay';
  document.body.appendChild(ov);

  function draw() {
    var pct = seconds > 0 ? timeLeft / seconds : 0;
    var C = 2*Math.PI*70;
    var off = C*(1-pct);
    var mins = Math.floor(timeLeft/60);
    var secs = timeLeft % 60;
    var timeStr = mins > 0 ? mins+':'+(secs<10?'0':'')+secs : secs+'s';
    var phase = timeLeft > seconds*0.1 ? 'ROUND' : 'FINISH!';
    var ringColor = timeLeft > seconds*0.33 ? '#00D4FF' : timeLeft > seconds*0.1 ? '#ffaa00' : '#ff4444';
    var pauseLabel = paused ? '&#x25B6; RESUME' : '&#x23F8; PAUSE';
    ov.innerHTML = '<div style="position:fixed;inset:0;background:rgba(2,6,16,0.98);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px">'
      + '<div style="font-size:9px;letter-spacing:3px;color:#ff4444;font-family:Impact,sans-serif;margin-bottom:8px;text-align:center">&#x1F94A; COMBO ROUND</div>'
      + '<div style="font-size:15px;font-family:Impact,sans-serif;color:var(--text);letter-spacing:1px;margin-bottom:20px;text-align:center;max-width:280px">'+comboName+'</div>'
      + '<div style="position:relative;width:180px;height:180px;margin-bottom:20px">'
      + '<svg width="180" height="180" style="transform:rotate(-90deg)">'
      + '<circle cx="90" cy="90" r="70" fill="none" stroke="#0a1020" stroke-width="10"/>'

// ═══════════════════════════════════════════════════════════
var COMBO_TIERS = {
  easy:         {label:'EASY',         icon:'&#x1F94B;', color:'#00ff88', rounds:3, minSec:120, maxSec:150, movesPerRound:4, rest:60},
  intermediate: {label:'INTERMEDIATE', icon:'&#x1F525;', color:'#ffaa00', rounds:4, minSec:150, maxSec:180, movesPerRound:6, rest:45},
  advanced:     {label:'ADVANCED',     icon:'&#x1F480;', color:'#ff4444', rounds:5, minSec:180, maxSec:240, movesPerRound:8, rest:30},
  sexgod:       {label:'SEX GOD MODE', icon:'&#x1F451;', color:'#aa88ff', rounds:5, minSec:240, maxSec:300, movesPerRound:10, rest:20}
};

function getAllComboMoves() {
  var moves = [];
  if(typeof COMBO_SYSTEMS === 'undefined') return moves;
  Object.keys(COMBO_SYSTEMS).forEach(function(sk){
    var sys = COMBO_SYSTEMS[sk];
    sys.combos.forEach(function(c){ c.seq.forEach(function(m){ if(moves.indexOf(m)<0) moves.push(m); }); });
  });
  return moves;
}

function shuffleArr(arr) {
  var a = arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}

function startTieredCombo(tierKey) {
  var tier = COMBO_TIERS[tierKey];
  if(!tier) return;
  var allMoves = getAllComboMoves();
  if(allMoves.length < 4){ showToast('Combo data not loaded'); return; }
  var existing = document.getElementById('tiered-combo-overlay');
  if(existing) existing.remove();
  var rounds = [];
  for(var r=0;r<tier.rounds;r++){
    var sec = tier.minSec + Math.floor(Math.random()*(tier.maxSec - tier.minSec + 1));
    rounds.push({sec:sec, moves:shuffleArr(allMoves).slice(0,tier.movesPerRound)});
  }
  var currentRound = 0;
  var isResting = false;
  var timeLeft = rounds[0].sec;
  var paused = false;
  var iv = null;
  var ov = document.createElement('div');
  ov.id = 'tiered-combo-overlay';
  document.body.appendChild(ov);

  function buildMoveSpans(moveArr) {
    return moveArr.map(function(m){
      var isD = ['Slip L','Slip R','Roll','Pivot','Cover','Frame','Wall','Gate','Step Out','Step Back','Exit','Inside Defense'].indexOf(m)>=0;
      return '<span style="display:inline-block;padding:3px 7px;border-radius:5px;border:1px solid '+(isD?'rgba(102,153,255,0.5)':'rgba(255,100,68,0.5)')+';color:'+(isD?'#6699ff':'#ff8866')+';font-size:9px;font-family:Impact,sans-serif;margin:2px">'+m+'<\/span>';
    }).join(' ');
  }

  function draw() {
    var roundData = rounds[currentRound];
    var total = isResting ? tier.rest : roundData.sec;
    var pct = total > 0 ? timeLeft/total : 0;
    var C = 2*Math.PI*65;
    var off = C*(1-pct);
    var mins = Math.floor(timeLeft/60);
    var secs = timeLeft % 60;
    var timeStr = mins > 0 ? mins+':'+(secs<10?'0':'')+secs : secs+'s';
    var ringColor = isResting ? '#00D4FF' : (pct > 0.33 ? tier.color : pct > 0.1 ? '#ffaa00' : '#ff4444');
    var pauseLabel = paused ? '&#x25B6; RESUME' : '&#x23F8; PAUSE';
    var roundDots = '';
    for(var i=0;i<tier.rounds;i++){
      var dotColor = i < currentRound ? tier.color : (i === currentRound ? ringColor : '#1a2a3a');
      roundDots += '<div style="width:10px;height:10px;border-radius:50%;background:'+dotColor+';border:1px solid '+(i===currentRound?ringColor:'#1a2a3a')+';transition:all 0.3s"><\/div>';
    }
    ov.innerHTML = '<div style="position:fixed;inset:0;background:rgba(2,6,16,0.98);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px 16px;overflow-y:auto">'
      + '<div style="display:flex;gap:8px;margin-bottom:10px;margin-top:8px">'+roundDots+'<\/div>'
      + '<div style="font-size:9px;letter-spacing:3px;color:'+tier.color+';font-family:Impact,sans-serif;margin-bottom:4px;text-align:center">'+tier.icon+' '+tier.label+'<\/div>'
      + '<div style="font-size:13px;font-family:Impact,sans-serif;color:var(--text);letter-spacing:1px;margin-bottom:4px;text-align:center">'+(isResting?'REST — BREATHE':'ROUND '+(currentRound+1)+' OF '+tier.rounds)+'<\/div>'
      + '<div style="position:relative;width:160px;height:160px;margin:8px auto">'
      + '<svg width="160" height="160" style="transform:rotate(-90deg)">'
      + '<circle cx="80" cy="80" r="65" fill="none" stroke="#0a1020" stroke-width="8"\/>'
      + '<circle cx="80" cy="80" r="65" fill="none" stroke="'+ringColor+'" stroke-width="8" stroke-linecap="round" stroke-dasharray="'+C+'" stroke-dashoffset="'+off+'" style="transition:stroke-dashoffset 0.9s linear;filter:drop-shadow(0 0 8px '+ringColor+')"\/>'
      + '<\/svg>'
      + '<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">'
      + '<div style="font-size:40px;font-family:Impact,sans-serif;color:'+ringColor+';line-height:1">'+timeStr+'<\/div>'
      + '<div style="font-size:9px;letter-spacing:2px;color:var(--text3);margin-top:2px">'+(isResting?'REST':'FIGHT')+'<\/div>'
      + '<\/div><\/div>'
      + (!isResting ? '<div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:10px 12px;margin:6px 0;width:100%;max-width:320px;text-align:center">'
        + '<div style="font-size:8px;letter-spacing:2px;color:var(--text3);margin-bottom:6px">THIS ROUND\'s TECHNIQUES<\/div>'
        + buildMoveSpans(roundData.moves)
        + '<\/div>' : '<div style="font-size:13px;color:var(--text2);text-align:center;margin:8px 0">Next: <span style="color:'+tier.color+'">'+((currentRound+1)<tier.rounds?'Round '+(currentRound+2):'Final Round')+'<\/span><\/div>')
      + '<div style="display:flex;gap:10px;margin-top:10px">'
      + '<button id="tcpause" style="padding:11px 22px;background:rgba(255,255,255,0.06);border:1px solid #2a2a3a;border-radius:10px;color:var(--text2);font-family:Impact,sans-serif;font-size:12px;cursor:pointer">'+pauseLabel+'<\/button>'
      + '<button id="tcstop" style="padding:11px 22px;background:rgba(255,0,60,0.08);border:1px solid rgba(255,0,60,0.3);border-radius:10px;color:#ff0055;font-family:Impact,sans-serif;font-size:12px;cursor:pointer">&#x2715; END<\/button>'
      + '<\/div><\/div>';
    var pb = document.getElementById('tcpause');
    var sb = document.getElementById('tcstop');
    if(pb) pb.onclick = function(){paused=!paused;draw();};
    if(sb) sb.onclick = function(){clearInterval(iv);ov.remove();};
  }

  function showComplete() {
    clearInterval(iv);
    ov.innerHTML = '<div style="position:fixed;inset:0;background:rgba(2,6,16,0.98);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px">'
      + '<div style="font-size:56px;margin-bottom:12px">'+tier.icon+'<\/div>'
      + '<div style="font-size:26px;font-family:Impact,sans-serif;color:'+tier.color+';letter-spacing:3px;margin-bottom:8px">SESSION COMPLETE<\/div>'
      + '<div style="font-size:13px;color:var(--text2);margin-bottom:6px">'+tier.rounds+' rounds &middot; '+tier.label+'<\/div>'
      + '<div style="font-size:11px;color:var(--text3);margin-bottom:24px">ELITE FIGHTER STATUS CONFIRMED<\/div>'
      + '<button id="tcdone" style="padding:14px 36px;background:rgba(0,255,136,0.1);border:1.5px solid var(--green);border-radius:12px;color:var(--green);font-family:Impact,sans-serif;font-size:15px;letter-spacing:2px;cursor:pointer">&#x2713; DONE<\/button>'
      + '<\/div>';
    if(typeof launchConfetti === 'function') launchConfetti();
    var db = document.getElementById('tcdone');
    if(db) db.onclick = function(){ov.remove();};
  }

  function tick() {
    if(paused) return;
    timeLeft--;
    if(timeLeft <= 0) {
      if(isResting){
        isResting = false; currentRound++;
        if(currentRound >= tier.rounds){ showComplete(); return; }
        timeLeft = rounds[currentRound].sec;
      } else {
        if(currentRound >= tier.rounds-1){ showComplete(); return; }
        isResting = true; timeLeft = tier.rest;
      }
    }
    draw();
  }

  draw();
  iv = setInterval(tick, 1000);
}

function getCombinedMartialTechnique(dayNum, dayIdx){
  var combined = [];
  if(typeof TECHNIQUE_LIBRARY !== 'undefined'){
    Object.keys(TECHNIQUE_LIBRARY).forEach(function(k){
      var sys = TECHNIQUE_LIBRARY[k];
      (sys.categories||[]).forEach(function(cat){
        (cat.techniques||[]).forEach(function(t){
          combined.push({
            source:'tech',
            system:sys.label,
            emoji:sys.emoji,
            color:sys.color,
            name:t.name,
            what:t.what,
            drill:t.drill,
            cue:t.cue,
            key:'tech_'+k+'_'+t.name
          });
        });
      });
    });
  }
  BJJ_SOLO_DRILLS.forEach(function(d, i){
    combined.push({
      source:'bjj',
      system:'BJJ SOLO',
      emoji:'🥋',
      color:'#69d2ff',
      name:d.name,
      what:d.purpose,
      drill:d.duration+' · '+d.focus,
      cue:'Hips move first. Frames before escapes.',
      chain:BJJ_FLOW_CHAINS[(dayNum + dayIdx + i) % BJJ_FLOW_CHAINS.length],
      key:'bjj_'+i
    });
  });
  if(!combined.length) return null;
  return combined[dayNum % combined.length];
}

function showKegelRest(secs, onDone) {
  var ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(7,14,26,0.97);z-index:9998;display:flex;align-items:center;justify-content:center';
  document.body.appendChild(ov);
  var t = secs;
  var R = 60, C = 2 * Math.PI * R;
  function draw() {
    var off = C * (t / secs);
    ov.innerHTML = '<div style="text-align:center">'
      + '<div style="font-size:11px;letter-spacing:3px;color:var(--text3);font-family:Impact,sans-serif;margin-bottom:20px">NEXT EXERCISE IN</div>'
      + '<div style="position:relative;width:160px;height:160px;margin:0 auto 20px">'
      + '<svg width="160" height="160" style="transform:rotate(-90deg)">'
      + '<circle cx="80" cy="80" r="' + R + '" fill="none" stroke="rgba(28,45,66,0.8)" stroke-width="8"/>'
      + '<circle cx="80" cy="80" r="' + R + '" fill="none" stroke="var(--cyan)" stroke-width="8" stroke-linecap="round"'
      + ' stroke-dasharray="' + C + '" stroke-dashoffset="' + off + '" style="filter:drop-shadow(0 0 8px rgba(0,212,255,0.6))"/>'
      + '</svg>'
      + '<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">'
      + '<div style="font-size:56px;font-family:Impact,sans-serif;color:var(--cyan);line-height:1">' + t + '</div>'
      + '<div style="font-size:10px;color:var(--text3);letter-spacing:2px;margin-top:4px">REST</div>'
      + '</div></div>'
      + '<div style="font-size:13px;color:var(--text2);font-style:italic">Breathe. Next exercise loading.</div>'
      + '</div>';
  }
  draw();
  var iv = setInterval(function() {
    t--;
    if (t <= 0) { clearInterval(iv); ov.remove(); onDone(); }
    else { draw(); if (navigator.vibrate) navigator.vibrate(30); }
  }, 1000);
}

// Weekly muscle tracking

// Record workout completion
function recordWorkout(type){
  let key = type.toLowerCase();
  if(key.includes("pull")) key = "pull";
  else if(key.includes("push")) key = "push";
  else if(key.includes("leg")) key = "legs";
  else if(key.includes("arm")) key = "arms";
  if(weeklyStats[key] !== undefined){
    weeklyStats[key]++;
  }
  saveWeeklyStats();
}

// Last workout memory

function saveLastWorkout(type){

lastWorkout = type;

type
);

// Balanced workout suggestion
function getBalancedWorkout(){

const groups = Object.entries(weeklyStats);

groups.sort((a,b)=>a[1]-b[1]);

return groups[0][0];
}

// Avoid repeating same muscle group
function getRecoverySafeGroups(){

const groups = ["pull","push","legs","arms"];

return groups.filter(g => g !== lastWorkout);
}

function getYesterdayWorkout(){
  const today = new Date()
  const yesterday = new Date(today)
  yesterday.setDate(today.getDate()-1)
  const y = yesterday.getFullYear()
  const m = String(yesterday.getMonth()+1).padStart(2,'0')
  const d = String(yesterday.getDate()).padStart(2,'0')
  const key = y + '-' + m + '-' + d
  const dayData = DB.days && DB.days[key]
  if(!dayData || !dayData.type) return null
  return dayData.type.toLowerCase()
}
  
// Smart recommendation
function getSmartWorkout(){
  const safe = getRecoverySafeGroups()
  if(!safe || safe.length===0) return 'rest'
  const yesterday = getYesterdayWorkout()
  const avoid = {
    pull:['pull','arms'],
    push:['push','arms'],
    legs:['legs'],
    arms:['arms']
  }
  let filtered = safe
  if(yesterday && avoid[yesterday]){
    filtered = safe.filter(g=>!avoid[yesterday].includes(g))
  }
  if(filtered.length===0){
    filtered = safe
  }
  const sorted = filtered.sort((a,b)=>weeklyStats[a]-weeklyStats[b])
  return sorted[0]
}

// Convert recommendation to display text
function getWorkoutRecommendation(){
const group = getSmartWorkout()
const names = {
pull:"PULL DAY",
push:"PUSH DAY",
legs:"LEG DAY",
arms:"ARMS & CORE"
}
return names[group] || "WORKOUT"
}
function checkWeeklyReset(){
const now = new Date()
const day = now.getDay() // Sunday=0 Monday=1
const lastReset = localStorage.getItem("weeklyResetDate")
// If Monday and not reset yet this week
if(day === 1){
const today = now.toISOString().slice(0,10)
if(lastReset !== today){
const resetStats = {
pull:0,
push:0,
legs:0,
arms:0
}
localStorage.setItem("weeklyStats", JSON.stringify(resetStats))
localStorage.setItem("weeklyResetDate", today)
}
}
}
function getMissedWorkout(){
const yesterday = getYesterdayWorkout()
if(!yesterday) return null
const stats = JSON.parse(localStorage.getItem("weeklyStats")) || {}
if(stats[yesterday] && stats[yesterday] > 0){
return null
}
return yesterday.toUpperCase()
}
  checkWeeklyReset();
